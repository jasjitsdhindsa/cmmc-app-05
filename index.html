// Tiny fetch wrapper that always sends/expects JSON and surfaces real errors.
const apiFetch=async(url,opts={})=>{
  const init={method:opts.method||"GET",headers:{"Accept":"application/json",...(opts.headers||{})},credentials:"same-origin"};
  if(opts.body!==undefined){
    init.headers["Content-Type"]="application/json";
    init.body=typeof opts.body==="string"?opts.body:JSON.stringify(opts.body);
  }
  const res=await fetch(url,init);
  let body=null;
  try{
    const ct=res.headers.get("content-type")||"";
    body=ct.includes("application/json")?await res.json():await res.text();
  }catch(_){}
  if(!res.ok){
    const msg=(body&&body.error)||`HTTP ${res.status} ${res.statusText}`;
    const err=new Error(msg);err.status=res.status;err.body=body;throw err;
  }
  return body;
};

const fetchUsersDir=async()=>{
  try{
    const r=await apiFetch("/api/users");
    _usersCache=Array.isArray(r.users)?r.users:[];
    return _usersCache.slice();
  }catch(e){
    // 401/403 just means the current user isn't an admin — that's fine, we
    // simply have an empty directory in their view.
    if(e.status===401||e.status===403){_usersCache=[];return [];}
    throw e;
  }
};
const saveUsersDir=async(users)=>{
  const r=await apiFetch("/api/users",{method:"PUT",body:{users}});
  if(r&&r.ok)_usersCache=users.slice();
  return r;
};
const saveCredUsers=us=>{_usersCache=us.slice();saveUsersDir(us).catch(e=>console.error("[users PUT]",e.message));};

const createCredUser=async(form)=>{
  const targetEmail=String(form.email||"").toLowerCase().trim();
  if(_usersCache.find(u=>u&&u.email&&u.email.toLowerCase()===targetEmail))return{error:"Email already exists"};
  const id="u"+Date.now();
  const pts=String(form.fullName||"").trim().split(" ");
  const av=pts.length>=2?(pts[0][0]+pts[pts.length-1][0]).toUpperCase():String(form.fullName).slice(0,2).toUpperCase();
  const cm={Admin:"#00d4ff",Assessor:"#7b2ff7",Auditor:"#f472b6"};
  const nu={id,fullName:String(form.fullName||"").trim(),email:targetEmail,dept:String(form.dept||"").trim()||"onsemi",role:form.role||"Auditor",avatar:av,color:cm[form.role||"Auditor"]||"#537a98"};
  _usersCache=[..._usersCache,nu];
  try{await saveUsersDir(_usersCache);}catch(e){return{error:"Could not save: "+(e.message||e)};}
  return nu;
};
const updateCredUser=async(uid,patch)=>{
  const i=_usersCache.findIndex(u=>u.id===uid);if(i<0)return false;
  _usersCache=_usersCache.map((u,j)=>j===i?{...u,...patch}:u);
  try{await saveUsersDir(_usersCache);return true;}catch(e){console.error("[users update]",e.message);return false;}
};
const deleteCredUser=async(uid)=>{
  const rem=_usersCache.filter(u=>u.id!==uid);
  if(rem.filter(u=>u.role==="Admin").length===0)return{error:"Cannot remove last Admin"};
  _usersCache=rem;
  try{await saveUsersDir(_usersCache);return true;}catch(e){return{error:"Could not save: "+(e.message||e)};}
};

const logAudit=(category,action,details,_user)=>{

const exportAuditCSV=async()=>{
  const entries=await fetchAuditLog();
  const header=["ID","Timestamp","Category","Action","Details","User Email","User Role","User Agent"];
  const rows=[header,...entries.map(e=>[e.id,e.ts,e.category,e.action,e.details,e.userEmail,e.userRole,e.userAgent])];
  const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`CMA_AuditLog_${new Date().toISOString().slice(0,10)}.csv`;
  a.style.display="none";document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
};

ring communities.","2":"Receives threat intel feeds passively; no contribution.","3":"Active ISAC/forum membership; threat intel shared.","4":"Intelligence integrated into risk management decisions.","5":"Leads sector threat sharing; contributes vetted indicators."},"A6_5":{"1":"No threat intelligence process; reacts to news only.","2":"Ad hoc intel collection; no formal analysis workflow.","3":"Formal TI process: collect, analyse, act, share.","4":"TI integrated into SIEM, vulnerability, and risk tools.","5":"Automated TI ingestion with real-time decision support."},"A6_6":{"1":"Projects launch with no IS review or involvement.","2":"IS consulted occasionally late in project lifecycle.","3":"IS gate mandatory at initiation, design, and launch.","4":"IS gate metrics tracked; compliance enforced in PMO.","5":"IS is a default workstream in all project methodologies."},"A6_7":{"1":"Remote workers operate with no security guidelines.","2":"Basic remote working guidance exists; inconsistently applied.","3":"Remote working policy enforced with technical controls.","4":"Remote working controls tested and compliance measured.","5":"Zero-trust architecture; remote risk continuously managed."},"A7_0":{"1":"No background checks; all candidates hired without screening.","2":"Basic identity checks only; no criminal or reference checks.","3":"Role-tiered screening: financial, criminal, and reference checks.","4":"Screening results tracked; high-risk roles re-screened.","5":"Continuous vetting with periodic refresh for critical roles."},"A7_1":{"1":"Employment contracts omit any IS obligations.","2":"Generic confidentiality clause only; no IS specifics.","3":"Contracts include IS duties, NDA, and breach consequences.","4":"Contracts reviewed annually; gaps closed for all staff.","5":"IS obligations enforced via HR system and automated alerts."},"A7_2":{"1":"No IS training at onboarding; staff self-taught.","2":"One-time onboarding awareness session; no follow-up.","3":"Regular IS training with completion tracking and testing.","4":"Training effectiveness measured; low scorers receive support.","5":"Adaptive, role-specific learning with behavioural metrics."},"A7_3":{"1":"Same generic training for all staff; no role tailoring.","2":"Some role-specific guidance but mostly generic content.","3":"Tailored curricula for devs, admins, execs, and end users.","4":"Training outcomes linked to performance metrics.","5":"AI-personalised training based on individual behaviour data."},"A7_4":{"1":"No disciplinary process; IS violations ignored.","2":"Violations escalated informally; outcomes inconsistent.","3":"Formal IS disciplinary process with graduated sanctions.","4":"Disciplinary data analysed for systemic training gaps.","5":"IS violations feed automated culture improvement programmes."},"A7_5":{"1":"No offboarding IS process; access often persists.","2":"Access revocation attempted but slow and inconsistent.","3":"Same-day access revocation tied to HR offboarding event.","4":"Offboarding compliance audited; SLA tracked monthly.","5":"Automated offboarding triggered by HR system in real time."},"A7_6":{"1":"No NDAs with staff, contractors, or third parties.","2":"NDAs signed by some but not all; inconsistently enforced.","3":"NDAs mandatory for all with IS system access.","4":"NDA coverage audited; gaps closed proactively.","5":"NDA lifecycle managed automatically via contract system."},"A7_7":{"1":"Access revocation takes days or weeks after termination.","2":"IT manually revokes access within 48\u201372 hours.","3":"Same-day revocation SLA met; asset return process enforced.","4":"Revocation time tracked; SLA breaches escalated immediately.","5":"Automated revocation in minutes via HR-IT integration."},"A8_0":{"1":"No asset inventory; no awareness of what data/systems exist.","2":"Partial spreadsheet inventory; frequently out of date.","3":"Complete CMDB with auto-discovery and ownership assigned.","4":"Inventory accuracy verified quarterly via h real-time threat URL updates."},"A13_4":{"1":"No DMARC, DKIM, or SPF; phishing attempts succeed freely.","2":"SPF published; DMARC in monitor mode only.","3":"DMARC p=reject enforced; DKIM signed; anti-phishing deployed.","4":"Email security metrics tracked; ATP reports reviewed weekly.","5":"AI-powered email threat detection; user reporting integrated."},"A13_5":{"1":"OT network fully connected to corporate IT; no isolation.","2":"Basic separation exists; informal and poorly maintained.","3":"OT formally segmented from IT; enforced firewall rules.","4":"OT/IT boundary tested; traffic anomalies alerted in real time.","5":"OT-specific IDS deployed; continuous traffic baseline monitoring."},"A13_6":{"1":"Open WiFi with no authentication; all traffic unencrypted.","2":"WPA2-PSK used; shared key rarely changed.","3":"WPA3/802.1X with RADIUS; rogue AP detection deployed.","4":"Wireless security audited quarterly; rogue APs auto-blocked.","5":"Continuous wireless threat monitoring with AI anomaly detection."},"A13_7":{"1":"Data transferred to third parties with no agreements.","2":"Some informal data-sharing agreements; terms inconsistent.","3":"Formal transfer policies and third-party agreements in place.","4":"Transfer compliance audited; DLP controls enforced.","5":"Automated data transfer monitoring with real-time policy checks."},"A14_0":{"1":"Projects start and end with no IS involvement.","2":"IS consulted occasionally; rarely influences decisions.","3":"IS is a mandatory gate at project initiation and launch.","4":"IS gate metrics tracked; non-compliance blocks releases.","5":"IS fully embedded in agile delivery; automated risk gates."},"A14_1":{"1":"No SSDLC; developers code without security guidance.","2":"Some security guidance exists; inconsistently followed.","3":"SSDLC defined and enforced; OWASP training for all devs.","4":"SSDLC maturity measured via SAMM; gaps formally tracked.","5":"Fully automated secure pipeline; dev security metrics published."},"A1 // ── SCORING FUNCTIONS (fixed) ────────────────────────────────────────────────
// dScore: true mean of ALL answered questions in a domain (standard + custom).
//   Denominator = number of answered questions only (not total questions).
//   Unanswered questions are excluded — they do not drag the score down.
const dScore=(resp,did,customQs)=>{
  const d=DOMAINS.find(x=>x.id===did);
  if(!d)return null;
  // Standard question scores (integer keys 0,1,2...)
  const stdVals=d.qs.map((_,i)=>resp[did]?.[i]).filter(x=>x!==undefined&&x!==null);
  // Custom question scores (string keys 'c0','c1',...)
  const cqs=(customQs&&customQs[did])||[];
  const cstVals=cqs.map((_,i)=>resp[did]?.['c'+i]).filter(x=>x!==undefined&&x!==null);
  const allVals=[...stdVals,...cstVals];
  // TRUE MEAN: sum of answered / count of answered (not total available)
  return allVals.length?allVals.reduce((a,b)=>a+b,0)/allVals.length:null;
};
// oScore: arithmetic mean of all non-null domain scores
const oScore=(resp,customQs)=>{
  const s=DOMAINS.map(d=>dScore(resp,d.id,customQs)).filter(x=>x!==null);
  return s.length?s.reduce((a,b)=>a+b,0)/s.length:null;
};
// dPct: fraction of questions answered (standard + custom combined)
const dPct=(resp,did,customQs)=>{
  const d=DOMAINS.find(x=>x.id===did);
  if(!d)return 0;
  const cqs=(customQs&&customQs[did])||[];
  const totalQs=d.qs.length+cqs.length;
  const stdAns=d.qs.filter((_,i)=>resp[did]?.[i]!==undefined).length;
  const cstAns=cqs.filter((_,i)=>resp[did]?.['c'+i]!==undefined).length;
  return totalQs===0?0:(stdAns+cstAns)/totalQs;
};

For CMMC levels 1-5, give ONE sentence (max 70 chars) each. JSON only:
{"1":"...","2":"...","3":"...","4":"...","5":"..."}`}]

function Dashboard({resp,owners,customQs,assessments}){
  const [drill,setDrill]=useState(null);
  const overall=useMemo(()=>oScore(resp,customQs),[resp,customQs]);
  const ds=useMemo(()=>DOMAINS.map(d=>({...d,score:dScore(resp,d.id,customQs)})),[resp,customQs]);
  // Bug6 fix: 'completed' = dPct===1.0 (all questions answered); 'started' = any answer
  const completed=ds.filter(d=>dPct(resp,d.id,customQs)===1.0).length;
  const started=ds.filter(d=>d.score!==null).length;
  const assessed=completed; // KPI shows fully-completed domains
  const crit=ds.filter(d=>d.score!==null&&d.score<1.5).length;
  const TARGET=3.0,lv=lf(overall),bo=BENCH.overall;

  // ── Year-over-Year aggregates ───────────────────────────────────────────
  // Build a map of {year → {Q1,Q2,Q3,Q4: score|null, avg: number|null, count: int}}
  // by computing oScore() for every assessment in the assessments list, grouping
  // by year and quarter. The quarter "average" for a year uses ONLY quarters that
  // have a non-null score (i.e. at least one question answered) — we do NOT
  // divide by 4 if some quarters are missing data, as that would distort the
  // average. Multiple assessments in the same quarter are themselves averaged.
  const yearStats=useMemo(()=>{
    const out={};
    if(!Array.isArray(assessments))return out;
    assessments.forEach(a=>{
      if(!a||!a.year||!a.quarter)return;
      const score=oScore(a.resp||{},a.customQs||{});
      if(score===null)return; // skip cycles with no answered questions
      if(!out[a.year])out[a.year]={Q1:[],Q2:[],Q3:[],Q4:[]};
      // Tolerate quarter values stored as "Q1" or "1"
      const qKey=String(a.quarter).startsWith("Q")?String(a.quarter):"Q"+String(a.quarter);
      if(out[a.year][qKey])out[a.year][qKey].push(score);
    });
    // Reduce arrays → per-quarter mean → year mean
    Object.keys(out).forEach(y=>{
      const yr=out[y];
      const qScores={};
      ["Q1","Q2","Q3","Q4"].forEach(q=>{
        qScores[q]=yr[q].length?yr[q].reduce((s,v)=>s+v,0)/yr[q].length:null;
      });
      const valid=Object.values(qScores).filter(v=>v!==null);
      out[y]={...qScores,avg:valid.length?valid.reduce((s,v)=>s+v,0)/valid.length:null,count:valid.length};
    });
    return out;
  },[assessments]);

  // Pick "current" year as the latest year with data, "prior" as the next one back.
  // We do NOT use the calendar current year — if the team hasn't started this
  // year's assessment yet, comparing the latest year on file to the empty
  // current year would always show a 100% drop, which is misleading.
  // We also explicitly filter to years with avg !== null — guards against
  // malformed quarter values (e.g. a cycle imported via Storage Explorer with
  // quarter="Spring") that would leave a year in the stats with no scored
  // quarters, causing curStats.avg.toFixed() to throw.
  const yearsWithData=Object.keys(yearStats)
    .filter(y=>yearStats[y].avg!==null)
    .map(Number).sort((a,b)=>b-a);
  const curYear=yearsWithData[0]||null;
  const priorYear=yearsWithData[1]||null;
  const curStats=curYear?yearStats[curYear]:null;
  const priorStats=priorYear?yearStats[priorYear]:null;
  // Delta in absolute CMMC points (not %) — points are the natural unit here
  // because CMMC is a 0–5 ordinal-ish scale, and "33% improvement" on a 1.5→2.0
  // change is much harder to interpret than "+0.5 points".
  const yoyDelta=(curStats&&priorStats&&curStats.avg!==null&&priorStats.avg!==null)
    ?(curStats.avg-priorStats.avg)
    :null;

  // Bug5 fix: exclude unassessed domains from radar (null→0 dragged polygon inward)
  const radarData=ds.map(d=>({subject:d.code,yours:d.score,industry:BENCH.domains[d.id]?.median||0}));
  const barData=[...ds].sort((a,b)=>(a.score||0)-(b.score||0)).map(d=>({code:d.code,score:d.score,bench:BENCH.domains[d.id]?.median}));
  const aboveMed=ds.filter(d=>d.score!==null&&BENCH.domains[d.id]&&d.score>=BENCH.domains[d.id].median).length;

  const clickStyle={cursor:"pointer",transition:"all .18s"};
  const KPIc=({label,val,unit,color,sub,type})=><div onClick={()=>setDrill(d=>d===type?null:type)} style={{background:drill===type?"#0f3258":C.card,border:`1px solid ${drill===type?C.accent+"88":C.border}`,borderRadius:12,padding:"14px 16px",flex:1,minWidth:100,...clickStyle}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent+"55";e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=drill===type?C.accent+"88":C.border;e.currentTarget.style.transform="none";}}>
    <div style={{fontSize:10,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".08em",marginBottom:5,display:"flex",justifyContent:"space-between"}}><span>{label}</span><span style={{color:C.accent+"88",fontSize:9}}>click ↗</span></div>

    {sub&&<div style={{fontSize:10,color:C.sub,marginTop:4,lineHeight:1.4}}>{sub}</div>}
  </div>;
  return<div style={{display:"grid",gridTemplateColumns:drill?"1fr 380px":"1fr",gap:14,alignItems:"start"}}>
    <div>
    <div style={{marginBottom:14}}><div style={{fontFamily:"'Syne',sans-serif",fontSize:21,fontWeight:800,letterSpacing:1,color:C.text}}>Executive Dashboard</div><div style={{fontSize:10,color:C.sub,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>ISO 27001:2022 · 14 domains · 112 questions · CMMC 0–5 · Semiconductor Benchmark n={BENCH.n} · <span style={{color:C.accent}}>Click any card for drill-down</span></div></div>
    <div style={{display:"flex",gap:9,marginBottom:14,flexWrap:"wrap"}}>
      <KPIc label="CMMC SCORE" val={overall!==null?overall.toFixed(1):"—"} unit="/5.0" color={lv?.color||C.sub} sub={lv?.label} type="score"/>
      <KPIc label="INDUSTRY MEDIAN" val={bo.median} unit="/5.0" color={C.blue} sub={`Semiconductor n=${BENCH.n}`} type="benchmark"/>

      <KPIc label="ABOVE INDUSTRY" val={aboveMed} unit="/14" color={aboveMed>=10?C.green:C.amber} sub="domains above median" type="above"/>
      <KPIc label="CRITICAL GAPS" val={crit} unit="" color={crit>0?C.red:C.green} sub={crit>0?"Immediate action":"None"} type="gaps"/>
      <KPIc label="GAP TO L3" val={overall!==null?Math.max(0,TARGET-overall).toFixed(1):"—"} unit="" color={overall!==null&&overall>=TARGET?C.green:C.amber} sub={overall!==null&&overall>=TARGET?"Target achieved ✓":"Points needed"} type="gap3"/>
    </div>
    {/* ── YEAR-OVER-YEAR SCOREBOARD ──────────────────────────────────────── */}
    {/* Shows the average of all quarterly CMMC scores for the latest year with
        data and the prior year, plus the delta and per-quarter breakdown.   */}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"15px 17px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,color:C.text}}>📅 Year-over-Year Maturity Trend</div>
          <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>
            Average CMMC score across all quarters with recorded data — based on every assessment cycle in the system
          </div>
        </div>
        {yearsWithData.length>0&&<div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>
          {yearsWithData.length} year{yearsWithData.length!==1?"s":""} of data · {Object.values(yearStats).reduce((s,y)=>s+y.count,0)} quarter{Object.values(yearStats).reduce((s,y)=>s+y.count,0)!==1?"s":""} scored
        </div>}
      </div>
      {!curStats
        ?<div style={{padding:"22px 0",textAlign:"center",color:C.sub,fontSize:11}}>

        :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,alignItems:"stretch"}}>

          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:6}}>PRIOR YEAR</div>
            {priorStats
              ?<>
                <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:lf(priorStats.avg)?.color||C.sub,lineHeight:1}}>{priorStats.avg.toFixed(1)}</span>

                </div>

                <div style={{display:"flex",gap:4,marginTop:9}}>

          {/* ── DELTA / TREND CARD ────────────────────────────────────── */}
          <div style={{background:yoyDelta===null?C.surface:(yoyDelta>=0?C.green+"11":C.red+"11"),border:`1px solid ${yoyDelta===null?C.border:(yoyDelta>=0?C.green+"55":C.red+"55")}`,borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center"}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:8}}>YEAR-OVER-YEAR CHANGE</div>

                </div>
                <div style={{fontSize:11,color:C.text,fontWeight:600,marginBottom:6}}>CMMC points</div>
                <div style={{fontSize:10,color:yoyDelta>=0?C.green:C.red,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>

                </div>
                <div style={{fontSize:9,color:C.sub,marginTop:5,fontFamily:"'JetBrains Mono',monospace"}}>{priorYear} → {curYear}</div>
              </>}
          </div>

          {/* ── CURRENT YEAR CARD ─────────────────────────────────────── */}
          <div style={{background:C.surface,border:`2px solid ${lf(curStats.avg)?.color||C.cyan}66`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:9,color:C.cyan,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",marginBottom:6,fontWeight:700}}>● CURRENT YEAR</div>
            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:lf(curStats.avg)?.color||C.sub,lineHeight:1}}>{curStats.avg.toFixed(1)}</span>
              <span style={{fontSize:11,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>/ 5.0</span>
            </div>
            <div style={{fontSize:11,color:C.text,fontWeight:600,marginBottom:8}}>{curYear}</div>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>{curStats.count} quarter{curStats.count!==1?"s":""} · {lf(curStats.avg)?.label||""}</div>
            <div style={{display:"flex",gap:4,marginTop:9}}>
              {["Q1","Q2","Q3","Q4"].map(q=>{
                const s=curStats[q];
                return<div key={q} style={{flex:1,padding:"5px 0",textAlign:"center",borderRadius:5,background:s===null?"#0f2d4744":lf(s)?.color+"22",border:`1px solid ${s===null?C.border:lf(s)?.color+"55"}`}}>
                  <div style={{fontSize:7,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".05em"}}>{q}</div>
                  <div style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:s===null?C.sub:lf(s)?.color||C.text,lineHeight:1.3}}>{s===null?"—":s.toFixed(1)}</div>

          </div>

    </div>

    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:12,marginBottom:12}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 11px",display:"flex",flexDirection:"column",alignItems:"center"}}>

        <div style={{width:"100%",marginTop:7}}><Lbl c="vs. SEMICONDUCTOR INDUSTRY (OVERALL)"/>
          {/* Fixed: use BENCH.overall quartiles, not a domain-specific benchmark */}

            <div style={{position:"absolute",left:`${(bo.q1/5)*100}%`,width:`${((bo.q3-bo.q1)/5)*100}%`,top:0,bottom:0,background:"#3a86ff22"}}/>

      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px",display:"flex",flexDirection:"column"}}>

    <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:12,marginBottom:12}}>

        </div>;})}

    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{padding:"9px 13px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:700,fontSize:12,color:C.text}}>Domain Benchmark: Semiconductor Industry n={BENCH.n}</div><div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>{BENCH.src}</div></div>
      <div style={{display:"grid",gridTemplateColumns:"24px 75px 1fr 52px 50px 55px 50px 95px 105px",padding:"7px 11px",background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".07em"}}><div/><div>CODE</div><div>DOMAIN</div><div>YOURS</div><div>Q1</div><div>MEDIAN</div><div>Q3</div><div>POSITION</div><div>RANGE</div></div>
      {ds.map((d,i)=>{const b=BENCH.domains[d.id],pos=d.score!==null&&b?bPos(d.score,d.id):null,delta=d.score!==null&&b?d.score-b.median:null;return<div key={d.id} onClick={()=>setDrill(dv=>dv===`dom_${d.id}`?null:`dom_${d.id}`)} style={{display:"grid",gridTemplateColumns:"24px 75px 1fr 52px 50px 55px 50px 95px 105px",padding:"8px 11px",borderBottom:i<ds.length-1?`1px solid ${C.border}`:"none",alignItems:"center",cursor:"pointer",background:drill===`dom_${d.id}`?"#0f3258":"transparent",transition:"background .15s"}} onMouseEnter={e=>{if(drill!==`dom_${d.id}`)e.currentTarget.style.background="#0a2845";}} onMouseLeave={e=>{if(drill!==`dom_${d.id}`)e.currentTarget.style.background="transparent";}}>
        <div style={{fontSize:13}}>{d.icon}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.sub}}>{d.code}</div><div style={{fontWeight:600,fontSize:11,color:C.text}}>{d.name}</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,color:d.score!==null?lf(d.score).color:C.sub}}>{d.score!==null?d.score.toFixed(1):"—"}</div>
        <div style={{fontSize:9,color:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{b?.q1||"—"}</div>
        <div style={{fontSize:9,color:C.blue,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{b?.median||"—"}</div>
        <div style={{fontSize:9,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>{b?.q3||"—"}</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>{pos?<span style={{display:"inline-flex",borderRadius:20,padding:"1px 7px",fontSize:8,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:pos.color+"22",color:pos.color,border:`1px solid ${pos.color}44`}}>{pos.label}</span>:<span style={{fontSize:8,color:C.sub}}>—</span>}{delta!==null&&<span style={{fontSize:8,color:delta>=0?C.green:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{delta>=0?"+":""}{delta.toFixed(1)}</span>}</div>
        <div><QBar score={d.score} did={d.id} size={100}/></div>
      </div>;})}
    </div>
    </div>
    {drill&&<div style={{position:"sticky",top:20,background:C.card,border:`1px solid ${C.accent}44`,borderRadius:14,padding:"16px",maxHeight:"90vh",overflowY:"auto"}}>
      {(()=>{
        if(drill.startsWith("dom_")){
          const did=drill.replace("dom_","");
          const d=ds.find(x=>x.id===did);
          if(!d)return null;
          const b=BENCH.domains[did],pos=d.score!==null&&b?bPos(d.score,did):null,p=d.score!==null?pri(d.score):null,pc=p?priC(p):null;
          return<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:20}}>{d.icon}</span><div><div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:C.text}}>{d.name}</div><div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>{d.code} · {d.cat}</div></div></div></div>
              <button onClick={()=>setDrill(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>✕</button>
            </div>
            <Gauge score={d.score} size={200}/>
            {b&&<div style={{marginTop:8}}><Lbl c="vs. SEMICONDUCTOR INDUSTRY"/><QBar score={d.score} did={did} size={200}/><div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}><span>Q1 {b.q1}</span><span>Med {b.median}</span><span>Q3 {b.q3}</span><span>Top% {b.top10}</span></div></div>}
            {pos&&<div style={{marginTop:8,padding:"5px 10px",background:pos.color+"15",border:`1px solid ${pos.color}33`,borderRadius:6,fontSize:10,color:pos.color,fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}>{pos.label} vs. Semiconductor Industry</div>}
            <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div style={{padding:"8px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,textAlign:"center"}}><div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:3}}>YOUR SCORE</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:d.score!==null?lf(d.score).color:C.sub}}>{d.score!==null?d.score.toFixed(1):"—"}</div></div>
              <div style={{padding:"8px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,textAlign:"center"}}><div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:3}}>INDUSTRY MED</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:C.blue}}>{b?.median||"—"}</div></div>
            </div>
            {p&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-flex",borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:pc+"22",color:pc,border:`1px solid ${pc}44`}}>{p}</span><span style={{fontSize:10,color:C.sub}}>priority</span></div>}
            {d.score!==null&&d.score<3.0&&<div style={{marginTop:12}}>
              <Lbl c="⚡ SHORT-TERM ACTIONS"/>
              {(DOMAINS.find(x=>x.id===did)?.shortTerm||[]).map((r,i)=><div key={i} style={{fontSize:10,color:C.sub,padding:"5px 8px",background:C.surface,border:"1px solid #f4a26133",borderRadius:5,marginBottom:4}}>⚡ {r.a} <span style={{color:C.amber,fontFamily:"'JetBrains Mono',monospace"}}>({r.d}d)</span></div>)}
              <Lbl c="🏗️ LONG-TERM ACTIONS" mt={8}/>
              {(DOMAINS.find(x=>x.id===did)?.longTerm||[]).map((r,i)=><div key={i} style={{fontSize:10,color:C.sub,padding:"5px 8px",background:C.surface,border:"1px solid #3a86ff33",borderRadius:5,marginBottom:4}}>🏗️ {r.a} <span style={{color:C.blue,fontFamily:"'JetBrains Mono',monospace"}}>({r.m}mo)</span></div>)}
            </div>}
          </div>;
        }
        return<DrillPanel type={drill} ds={ds} resp={resp} owners={owners} overall={overall} customQs={customQs} onClose={()=>setDrill(null)}/>;
      })()}
    </div>}
  </div>;
}

// ── MODULE-LEVEL STABLE COMPONENTS (prevent unmount on parent re-render) ─────
// RatingControl: decimal slider + quick-select buttons
function RatingControl({score,onSet,ro}){
  const lv=score!==undefined?lf(score):null;
  const setScore=v=>{if(!ro)onSet(Math.round(v*10)/10);};
  const clearScore=()=>{if(!ro)onSet(undefined);};
  return<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:3,marginBottom:8}}>
      {CMMC.map(l=>{
        const isActive=score!==undefined&&(l.level===5?score>=5:Math.floor(score)===l.level);
        return<button key={l.level} onClick={()=>setScore(l.level)} disabled={ro}
          style={{border:`2px solid ${isActive?l.color:C.border}`,borderRadius:7,padding:"5px 2px",
            background:isActive?l.bg:"transparent",cursor:ro?"not-allowed":"pointer",
            transition:"all .15s",textAlign:"center",opacity:ro&&!isActive?.5:1,minWidth:0}}
          title={`L${l.level} — ${l.label}`}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,color:l.color,lineHeight:1}}>{l.level}</div>
          <div style={{fontSize:6,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginTop:2,lineHeight:1.1}}>{l.short}</div>
        </button>;})}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:4}}>
      <input type="range" min="0" max="5" step="0.1"
        value={score!==undefined?score:0}
        onChange={e=>setScore(parseFloat(e.target.value))}
        disabled={ro} className="cmmc-slider"
        style={{flex:1,"--thumb-color":lv?.color||"#00d4ff"}}
      />
      <div style={{background:lv?lv.bg:"#0f2d47",border:`2px solid ${lv?lv.color:C.border}`,
        borderRadius:9,padding:"5px 10px",minWidth:52,textAlign:"center",flexShrink:0,transition:"all .2s"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17,color:lv?lv.color:C.sub,lineHeight:1}}>
          {score!==undefined?score.toFixed(1):"—"}
        </div>
        <div style={{fontSize:7,color:lv?lv.color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginTop:2,letterSpacing:".04em"}}>
          {lv?lv.short:"NONE"}
        </div>
      </div>
      {!ro&&score!==undefined&&<button onClick={clearScore} title="Clear rating"
        style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:6,
          padding:"4px 6px",fontSize:10,cursor:"pointer",flexShrink:0,lineHeight:1}}>✕</button>}
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:7,color:"#163d5a",
      fontFamily:"'JetBrains Mono',monospace",paddingRight:score!==undefined?"68px":"58px",paddingLeft:2}}>
      {[0,1,2,3,4,5].map(n=><span key={n} style={{color:CMMC[n].color,opacity:.7}}>{n}.0</span>)}
    </div>
    {score!==undefined&&<div style={{marginTop:6,fontSize:10,color:lv.color,
      fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:6}}>
      <span style={{display:"inline-flex",borderRadius:20,padding:"1px 8px",
        background:lv.bg,border:`1px solid ${lv.color}44`,fontWeight:700}}>{lv.short}</span>
      <span>{lv.label}</span>
      <span style={{color:C.sub}}>· {score.toFixed(1)} / 5.0</span>
    </div>}
  </div>;
}

// QCard: individual assessment question card with score, comment & evidence
function QCard({q2,qi,isCustom,score,onSetScore,comment,onSetComment,
                evidence,onUploadEvidence,onRemoveEvidence,ro,domain,onRemoveCustomQ}){
  const key=isCustom?'c'+qi:qi;
  const lv=score!==undefined?lf(score):null;
  const [showCmt,setShowCmt]=useState(!!comment);
  const [showEv,setShowEv]=useState(evidence.length>0);
  const [cmtPosted,setCmtPosted]=useState(!!comment);   // true = show posted view; false = show editor
  const fileInputRef=React.useRef();
  const fmtBytes=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(1)+' MB';
  // Minimal local/setLocal shim so MaturityGuide works unchanged
  const mgLocal={[qi]:score};
  const mgSetLocal=updater=>{const u=updater(mgLocal);if(u[qi]!==undefined)onSetScore(u[qi]);};
  return<div style={{background:C.card,border:`1px solid ${score!==undefined?lv.color+"44":C.border}`,borderRadius:12,marginBottom:9,overflow:"hidden",position:"relative"}}>
    {isCustom&&!ro&&onRemoveCustomQ&&<button onClick={()=>onRemoveCustomQ(domain.id,qi)} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:C.red+"88",fontSize:14,cursor:"pointer"}} title="Remove">✕</button>}
    <div style={{padding:"13px 15px"}}>
      {/* Question header + score */}
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <div style={{width:22,height:22,borderRadius:"50%",background:score!==undefined?lv.bg:isCustom?"#f4a26115":"#0f2d4722",border:`1.5px solid ${score!==undefined?lv.color:isCustom?C.amber+"55":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:score!==undefined?lv.color:isCustom?C.amber+"99":C.sub,fontWeight:700,flexShrink:0,marginTop:2}}>{score!==undefined?"✓":isCustom?"★":(qi+1)}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>[{q2.ctrl}]</div>{isCustom&&<span style={{display:"inline-flex",borderRadius:10,padding:"1px 6px",fontSize:8,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:C.amber+"22",color:C.amber,border:`1px solid ${C.amber}44`}}>CUSTOM</span>}</div>
          <div style={{fontSize:12,fontWeight:500,lineHeight:1.6,color:C.text,marginBottom:8}}>{q2.text}</div>
          <RatingControl score={score} onSet={onSetScore} ro={ro}/>
        </div>
      </div>
      {/* AI Maturity Guide (standard questions only) */}
      {!isCustom&&<MaturityGuide question={q2} domain={domain} qi={qi} local={mgLocal} setLocal={mgSetLocal} readonly={ro}/>}
      {/* Comment & Evidence toggles */}
      <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
        <button onClick={()=>{setShowCmt(v=>!v);}} style={{display:"flex",alignItems:"center",gap:5,background:showCmt?"#1d3a5a":"none",border:`1px solid ${comment?C.blue+"66":C.border}`,color:comment?C.blue:C.sub,borderRadius:7,padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>
          💬 {cmtPosted&&comment?"Comment posted":comment?"Comment (draft)":"Add Comment"}{cmtPosted&&comment&&<span style={{background:C.green+"33",color:C.green,borderRadius:8,padding:"0 5px",fontSize:9}}>✓</span>}
        </button>
        <button onClick={()=>setShowEv(v=>!v)} style={{display:"flex",alignItems:"center",gap:5,background:showEv?"#1a3520":"none",border:`1px solid ${evidence.length?C.green+"66":C.border}`,color:evidence.length?C.green:C.sub,borderRadius:7,padding:"4px 10px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>
          📎 {evidence.length?`${evidence.length} file${evidence.length!==1?"s":""} attached`:"Add Evidence"}
        </button>
      </div>
      {/* Comment section — edit mode or posted view */}
      {showCmt&&<div style={{marginTop:10,padding:"10px 12px",background:C.surface,border:`1px solid ${cmtPosted&&comment?C.green+"44":C.blue+"33"}`,borderRadius:8,transition:"border-color .2s"}}>

        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:9,color:cmtPosted&&comment?C.green:C.blue,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".08em",fontWeight:700}}>
            💬 JUSTIFICATION / COMMENT{cmtPosted&&comment&&<span style={{marginLeft:8,color:C.green}}>✓ POSTED</span>}
          </div>
          {/* Posted timestamp */}
          {cmtPosted&&comment&&<div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>{comment.length} chars</div>}
        </div>

        {/* READ-ONLY (Auditor) */}
        {ro&&<div style={{fontSize:11,color:C.text,lineHeight:1.7,minHeight:30,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{comment||<span style={{color:C.sub,fontStyle:"italic"}}>No comment provided</span>}</div>}

        {/* POSTED VIEW (non-auditor, after posting) */}
        {!ro&&cmtPosted&&comment&&<div>
          <div style={{fontSize:11,color:C.text,lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word",padding:"10px 12px",background:C.card,border:`1px solid ${C.green+"33"}`,borderRadius:7,marginBottom:8}}>
            {comment}
          </div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>setCmtPosted(false)}
              style={{display:"flex",alignItems:"center",gap:5,background:"none",border:`1px solid ${C.blue+"55"}`,color:C.blue,borderRadius:7,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>
              ✏️ Edit Comment
            </button>
            <button onClick={()=>{onSetComment('');setCmtPosted(false);}}
              style={{display:"flex",alignItems:"center",gap:5,background:"none",border:`1px solid ${C.red+"44"}`,color:C.red+"aa",borderRadius:7,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>
              🗑️ Remove
            </button>
          </div>
        </div>}

        {/* EDIT VIEW (non-auditor, before posting or while editing) */}
        {!ro&&(!cmtPosted||!comment)&&<div>
          <textarea
            value={comment}
            onChange={e=>onSetComment(e.target.value)}
            placeholder="Type your justification / rationale here. Explain why you selected this rating, what evidence exists, and any known gaps. No character limit."
            rows={4}
            style={{width:"100%",background:"#071726",border:`1px solid ${C.border}`,borderRadius:7,
              padding:"10px 12px",color:C.text,fontSize:11,outline:"none",resize:"vertical",
              fontFamily:"'Space Grotesk',sans-serif",lineHeight:1.7,boxSizing:"border-box"}}
          />
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>
              {comment.length>0?`${comment.length} characters — no limit`:"Start typing your comment above"}
            </div>
            <button
              onClick={()=>{if(comment.trim()){setCmtPosted(true);}}}
              disabled={!comment.trim()}
              style={{
                background:comment.trim()?"linear-gradient(135deg,#1e40af,#60a5fa)":"#163d5a",
                color:comment.trim()?"#fff":C.sub,
                border:"none",borderRadius:8,padding:"7px 18px",fontSize:11,fontWeight:700,
                cursor:comment.trim()?"pointer":"not-allowed",
                fontFamily:"'Space Grotesk',sans-serif",
                transition:"all .2s",
                display:"flex",alignItems:"center",gap:6,
              }}
            >
              ✓ Post Comment
            </button>
          </div>
        </div>}

      </div>}
      {/* Evidence section */}
      {showEv&&<div style={{marginTop:10,padding:"10px 12px",background:C.surface,border:`1px solid ${C.green+"33"}`,borderRadius:8}}>
        <div style={{fontSize:9,color:C.green,fontFamily:"'JetBrains Mono',monospace",marginBottom:8,letterSpacing:".08em"}}>📎 SUPPORTING EVIDENCE</div>
        {evidence.map((ev,idx)=><div key={idx} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",background:C.card,border:`1px solid ${C.border}`,borderRadius:6,marginBottom:5}}>
          <span style={{fontSize:14}}>{ev.type?.startsWith("image")?"🖼️":ev.type?.includes("pdf")?"📄":ev.type?.includes("sheet")||ev.type?.includes("excel")?"📊":ev.type?.includes("word")?"📝":"📎"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.name}</div>
            <div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>{fmtBytes(ev.size)} · {new Date(ev.uploaded).toLocaleDateString()}</div>
          </div>
          <a href={ev.data} download={ev.name} style={{background:"none",border:`1px solid ${C.border}`,color:C.cyan,borderRadius:5,padding:"3px 8px",fontSize:9,cursor:"pointer",textDecoration:"none",fontFamily:"'Space Grotesk',sans-serif"}}>⬇</a>
          {!ro&&<button onClick={()=>onRemoveEvidence(idx)} style={{background:"none",border:`1px solid ${C.red+"44"}`,color:C.red+"88",borderRadius:5,padding:"3px 7px",fontSize:9,cursor:"pointer"}}>✕</button>}
        </div>)}
        {!ro&&<div>
          <input ref={fileInputRef} type="file" multiple accept="*/*" style={{display:"none"}} onChange={e=>{Array.from(e.target.files).forEach(f=>onUploadEvidence(f));e.target.value='';}}/>
          <button onClick={()=>fileInputRef.current.click()} style={{width:"100%",background:"none",border:`2px dashed ${C.green+"44"}`,color:C.green,borderRadius:7,padding:"8px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",marginTop:evidence.length?6:0}}>
            + Attach files (PDF, images, documents, spreadsheets…)
          </button>
        </div>}
        {evidence.length===0&&ro&&<div style={{fontSize:10,color:C.sub,fontStyle:"italic"}}>No evidence attached</div>}
      </div>}
    </div>
  </div>;
}

function AssessPage({user,domain,resp,owners,customQs,onSave,onAddCustomQ,onRemoveCustomQ,onBack}){
  const ro=user.role==="Auditor"||(!canAss(user,owners,domain.id)&&user.role!=="Admin");
  const cqs=customQs?.[domain.id]||[];
  const [local,setLocal]=useState(()=>{const init={};domain.qs.forEach((_,i)=>{if(resp[domain.id]?.[i]!==undefined)init[i]=resp[domain.id][i];});cqs.forEach((_,i)=>{if(resp[domain.id]?.['c'+i]!==undefined)init['c'+i]=resp[domain.id]['c'+i];});return init;});
  const [localComments,setLocalComments]=useState(()=>{const init={};domain.qs.forEach((_,i)=>{if(resp[domain.id]?.['cmt_'+i])init['cmt_'+i]=resp[domain.id]['cmt_'+i];});cqs.forEach((_,i)=>{if(resp[domain.id]?.['cmt_c'+i])init['cmt_c'+i]=resp[domain.id]['cmt_c'+i];});return init;});
  const [localEvidence,setLocalEvidence]=useState(()=>{const init={};domain.qs.forEach((_,i)=>{if(resp[domain.id]?.['ev_'+i])init['ev_'+i]=resp[domain.id]['ev_'+i];});cqs.forEach((_,i)=>{if(resp[domain.id]?.['ev_c'+i])init['ev_c'+i]=resp[domain.id]['ev_c'+i];});return init;});
  const [saved,setSaved]=useState(false);
  const [showAddQ,setShowAddQ]=useState(false);
  const [newQ,setNewQ]=useState({ctrl:'',text:''});
  const ans=domain.qs.filter((_,i)=>local[i]!==undefined).length;
  const cAns=cqs.filter((_,i)=>local['c'+i]!==undefined).length;
  const totalAns=ans+cAns,totalQs=domain.qs.length+cqs.length;
  const allVals=[...domain.qs.map((_,i)=>local[i]),...cqs.map((_,i)=>local['c'+i])].filter(v=>v!==undefined);
  const score=allVals.length===0?null:allVals.reduce((a,b)=>a+b,0)/allVals.length;
  const b=BENCH.domains[domain.id],pos=score!==null&&b?bPos(score,domain.id):null;
  const save=()=>{
    const toSave={};
    domain.qs.forEach((_,i)=>{
      if(local[i]!==undefined)toSave[i]=local[i];
      if(localComments['cmt_'+i])toSave['cmt_'+i]=localComments['cmt_'+i];
      if(localEvidence['ev_'+i])toSave['ev_'+i]=localEvidence['ev_'+i];
    });
    cqs.forEach((_,i)=>{
      if(local['c'+i]!==undefined)toSave['c'+i]=local['c'+i];
      if(localComments['cmt_c'+i])toSave['cmt_c'+i]=localComments['cmt_c'+i];
      if(localEvidence['ev_c'+i])toSave['ev_c'+i]=localEvidence['ev_c'+i];
    });
    onSave(domain.id,toSave);
  const answeredCount=Object.keys(toSave).filter(k=>!k.startsWith('cmt_')&&!k.startsWith('ev_')).length;
  logAudit('ASSESSMENT','Domain Saved',`Domain: ${domain.name} | ${answeredCount} questions answered`,user);
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const addCustomQ=()=>{if(!newQ.text.trim())return;if(onAddCustomQ)onAddCustomQ(domain.id,{ctrl:newQ.ctrl||'Custom',text:newQ.text.trim()});setNewQ({ctrl:'',text:''});setShowAddQ(false);};
  const catC={Governance:C.purple,Technical:C.cyan,People:C.green,Operations:C.amber,Physical:C.red}[domain.cat]||C.sub;

  // Handle file upload for evidence — convert to base64 data URL stored in state
  const handleEvidenceUpload=(qKey,file)=>{
    if(!file)return;
    // Warn for large files (>2MB)
  if(file.size>2*1024*1024){
    if(!window.confirm(`File is ${(file.size/1024/1024).toFixed(1)}MB. Large files slow down Azure sync. Continue?`))return;
  }
  if(file.size>10*1024*1024){alert("File exceeds 10MB maximum. Please compress or use a link.");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const evKey='ev_'+qKey;
    const existing=localEvidence[evKey]||[];
      setLocalEvidence(p=>({...p,[evKey]:[...existing,{name:file.name,size:file.size,type:file.type,data:e.target.result,uploaded:new Date().toISOString()}]}));
    };
    reader.readAsDataURL(file);
  };

  const removeEvidence=(qKey,idx)=>{
    const evKey='ev_'+qKey;
    setLocalEvidence(p=>({...p,[evKey]:(p[evKey]||[]).filter((_,i)=>i!==idx)}));
  };

  const formatBytes=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KB':(n/1048576).toFixed(1)+' MB';


  return<div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:8,padding:"7px 13px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>← Back</button>
      {ro&&<div style={{padding:"5px 10px",background:C.pink+"15",border:`1px solid ${C.pink}44`,borderRadius:7,fontSize:10,color:C.pink,fontFamily:"'JetBrains Mono',monospace"}}>🔍 Read-only — Auditor view</div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 265px",gap:15,alignItems:"start"}}>
      <div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"15px 17px",marginBottom:11}}>
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:7}}>
            <div style={{width:40,height:40,borderRadius:9,background:catC+"15",border:`1px solid ${catC}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>{domain.icon}</div>
            <div style={{flex:1}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.sub,marginBottom:2}}>{domain.code} · {domain.cat}</div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,color:C.text}}>{domain.name}</div></div>
            {!ro&&onAddCustomQ&&<button onClick={()=>setShowAddQ(v=>!v)} style={{background:showAddQ?"#0f3258":"none",border:`1px solid ${showAddQ?C.amber+"88":C.amber+"44"}`,color:C.amber,borderRadius:8,padding:"7px 13px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",fontWeight:600}}>★ Add Custom Q</button>}
          </div>
          <div style={{fontSize:11,color:C.sub,lineHeight:1.6,marginBottom:7}}>{domain.desc}</div>
          <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>📋 {domain.qs.length} ISO{cqs.length>0?` + ${cqs.length} custom`:""} · {totalAns}/{totalQs} answered · Score: {score!==null?score.toFixed(1):"—"}/5.0{pos?` · ${pos.label}`:""}</div>
        </div>
        {showAddQ&&!ro&&<div style={{background:C.card,border:`2px solid ${C.amber}44`,borderRadius:12,padding:"15px",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:12,color:C.amber,marginBottom:10}}>★ Add Custom Question to {domain.code}</div>
          <div style={{marginBottom:8}}><Lbl c="ISO 27001 CONTROL REF (optional)"/><input value={newQ.ctrl} onChange={e=>setNewQ(p=>({...p,ctrl:e.target.value}))} placeholder="e.g. A.9.1.3 or Custom" style={{width:"100%",background:"#071726",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:12,outline:"none"}}/></div>
          <div style={{marginBottom:10}}><Lbl c="QUESTION TEXT *"/><textarea value={newQ.text} onChange={e=>setNewQ(p=>({...p,text:e.target.value}))} placeholder="Enter your custom assessment question..." rows={3} style={{width:"100%",background:"#071726",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",resize:"vertical",fontFamily:"'Space Grotesk',sans-serif"}}/></div>
          <div style={{display:"flex",gap:9}}><button onClick={addCustomQ} disabled={!newQ.text.trim()} style={{flex:1,background:"linear-gradient(135deg,#6b4a00,#f4a261)",color:"#1a0e00",border:"none",borderRadius:7,padding:"9px",fontSize:12,fontWeight:700,cursor:newQ.text.trim()?"pointer":"not-allowed",opacity:newQ.text.trim()?1:.5,fontFamily:"'Space Grotesk',sans-serif"}}>★ Add Question</button><button onClick={()=>{setShowAddQ(false);setNewQ({ctrl:'',text:''});}} style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:7,padding:"9px 14px",fontSize:12,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>Cancel</button></div>
        </div>}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"9px 13px",marginBottom:11}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:9,color:C.sub,marginRight:3}}>LEVEL GUIDE:</span>
            {CMMC.map(l=><span key={l.level} style={{display:"flex",alignItems:"center",gap:3,fontSize:9}}><div style={{width:8,height:8,borderRadius:2,background:l.color}}/><span style={{color:l.color,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{l.level}</span><span style={{color:C.sub}}>{l.label}</span></span>)}
          </div>
          <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",borderTop:`1px solid ${C.border}`,paddingTop:5}}>
            💡 Click a level button for a whole number, or use the slider for decimal precision (e.g. 2.3 = partially Managed, 2.8 = nearly Defined)
          </div>
        </div>
        {domain.qs.length>0&&<div style={{marginBottom:4}}>
          <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".07em",marginBottom:7,display:"flex",alignItems:"center",gap:7}}><div style={{height:1,flex:1,background:C.border}}/><span>ISO 27001:2022 STANDARD ({domain.qs.length})</span><div style={{height:1,flex:1,background:C.border}}/></div>
          {domain.qs.map((q2,qi)=>{
            const stdKey=qi;
            return<QCard key={'std_'+stdKey} q2={q2} qi={qi} isCustom={false}
              score={local[stdKey]}
              onSetScore={v=>v===undefined?setLocal(p=>{const n={...p};delete n[stdKey];return n;}):setLocal(p=>({...p,[stdKey]:v}))}
              comment={localComments['cmt_'+stdKey]||''}
              onSetComment={v=>setLocalComments(p=>({...p,['cmt_'+stdKey]:v}))}
              evidence={localEvidence['ev_'+stdKey]||[]}
              onUploadEvidence={f=>handleEvidenceUpload(stdKey,f)}
              onRemoveEvidence={idx=>removeEvidence(stdKey,idx)}
              ro={ro} domain={domain} onRemoveCustomQ={onRemoveCustomQ}
            />;
          })}

// [removed] AzureStorageConfig — SAS tokens and account names are no

function AdminPage({owners,setOwners,appUsers,setAppUsers,refreshUsers,user,azCfg,setAzCfg,azStatus,azError,azRefresh}){
  const [tab,setTab]=useState("owners");
  const [showAddForm,setShowAddForm]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [newUser,setNewUser]=useState({fullName:"",email:"",dept:"",role:"Assessor"});
  const [confirmRemove,setConfirmRemove]=useState(null);
  const cc={Governance:C.purple,Technical:C.cyan,People:C.green,Operations:C.amber,Physical:C.red};
  const TabBtn=({id,label})=><button onClick={()=>setTab(id)} style={{background:tab===id?"#0f3258":C.card,border:`1px solid ${tab===id?C.accent+"55":C.border}`,color:tab===id?C.accent:C.sub,borderRadius:8,padding:"7px 15px",fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"'Space Grotesk',sans-serif"}}>{label}</button>;
  const perms=[["View Executive Dashboard","✓","✓","✓"],["View Domain Scores & Benchmark","✓","✓","✓"],["View Improvement Roadmap","✓","✓","✓"],["Complete Own Domain Assessment","✓","✓","✗"],["Complete Any Domain Assessment","✓","✗","✗"],["Use AI Maturity Guide","✓","✓","✓"],["Assign Domain Owners","✓","✗","✗"],["Manage Users & Roles","✓","✗","✗"],["Export Assessment Data","✓","✓","✓"]];

  // Generate avatar initials from full name
  const mkAvatar=name=>{const p=name.trim().split(" ");return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();};

  // Role colour helper
  const roleColor=role=>({Admin:C.cyan,Assessor:C.purple,Auditor:C.pink})[role]||C.sub;
  const roleIcon=role=>({Admin:"🔑",Assessor:"📝",Auditor:"🔍"})[role]||"👤";

  // Add new user
  const [addErr,setAddErr]=useState("");
  const addUser=async()=>{
    if(!newUser.fullName.trim()||!newUser.email.trim()||!newUser.dept.trim()){setAddErr("Fill all required fields.");return;}
    if(!newUser.email.toLowerCase().endsWith("@onsemi.com")){setAddErr("Email must be an @onsemi.com address.");return;}
    setAddErr("");
    const result=await createCredUser({...newUser,initialPassword:newUser.initialPassword||"CMA@onsemi2024!"});
    if(result.error){setAddErr(result.error);return;}
    if(refreshUsers)refreshUsers();else setAppUsers(getCredUsers());
    setNewUser({fullName:"",email:"",dept:"",role:"Assessor",initialPassword:""});
    setShowAddForm(false);
  };

  // Remove user (prevent removing last Admin)
  const removeUser=async uid=>{
    const result=await deleteCredUser(uid);
    if(result&&result.error){alert(result.error);return;}
    if(refreshUsers)refreshUsers();else setAppUsers(getCredUsers());
    setOwners(prev=>{const n={...prev};Object.keys(n).forEach(k=>{if(n[k]===uid)delete n[k];});return n;});
    setConfirmRemove(null);
  };

  // Update role inline
  const updateRole=async(uid,newRole)=>{
    const u=appUsers.find(x=>x.id===uid);
    if(u&&u.role==="Admin"&&newRole!=="Admin"){
      const remainingAdmins=appUsers.filter(x=>x.id!==uid&&x.role==="Admin").length;
      if(remainingAdmins===0){alert("Cannot change the last Admin's role. Add another Admin first.");return;}
    }
    await updateCredUser(uid,{role:newRole,color:roleColor(newRole)});
    if(refreshUsers)refreshUsers();else setAppUsers(getCredUsers());
    if(newRole==="Auditor"){setOwners(prev=>{const n={...prev};Object.keys(n).forEach(k=>{if(n[k]===uid)delete n[k];});return n;});}
  };

  const inputStyle={background:"#071726",border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",color:C.text,fontSize:11,outline:"none",fontFamily:"'Space Grotesk',sans-serif",width:"100%",boxSizing:"border-box"};
  const selectStyle={...inputStyle,cursor:"pointer"};

  return<div>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:21,fontWeight:800,letterSpacing:1,color:C.text,marginBottom:14}}>Administration</div>
    <div style={{display:"flex",gap:5,marginBottom:14}}>
      <TabBtn id="owners" label="Domain Ownership"/>
      <TabBtn id="users" label={`Team Management (${appUsers.length})`}/>
      <TabBtn id="rbac" label="RBAC Matrix"/>
      <TabBtn id="audit" label="📋 Audit Logs"/>
    </div>

    {/* ── DOMAIN OWNERSHIP ── */}
    {tab==="owners"&&<div>
      <div style={{marginBottom:9,fontSize:11,color:C.sub}}>Assign the domain owner responsible for completing the assessment. Assessors can only edit their assigned domains.</div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"24px 82px 1fr 75px 230px",padding:"7px 11px",background:C.surface,borderBottom:`1px solid ${C.border}`,fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".07em"}}><div/><div>CODE</div><div>DOMAIN</div><div>CATEGORY</div><div>ASSIGNED OWNER</div></div>
        {DOMAINS.map((d,i)=>{const owner=appUsers.find(u=>u.id===owners[d.id]),ccc=cc[d.cat]||C.sub;return<div key={d.id} style={{display:"grid",gridTemplateColumns:"24px 82px 1fr 75px 230px",padding:"9px 11px",borderBottom:i<DOMAINS.length-1?`1px solid ${C.border}`:"none",alignItems:"center"}}>
          <div style={{fontSize:13}}>{d.icon}</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:C.sub}}>{d.code}</div>
          <div style={{fontWeight:600,fontSize:11,color:C.text}}>{d.name}</div>
          <span style={{display:"inline-flex",borderRadius:20,padding:"2px 9px",fontSize:8,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:ccc+"22",color:ccc,border:`1px solid ${ccc}33`}}>{d.cat}</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {owner&&<Av u={owner} sz={18}/>}
            <select value={owners[d.id]||""} onChange={e=>setOwners(p=>({...p,[d.id]:e.target.value}))}
              style={{flex:1,fontSize:11,padding:"4px 7px",background:"#071726",border:`1px solid ${C.border}`,borderRadius:6,color:C.text}}>
              <option value="">Unassigned</option>
              {appUsers.filter(u=>u.role!=="Auditor").map(u=><option key={u.id} value={u.id}>{u.fullName} ({u.role})</option>)}
            </select>
          </div>
        </div>;})}
      </div>
    </div>}

    {/* ── TEAM MANAGEMENT ── */}
    {tab==="users"&&<div>
      {/* Header row with Add Member button */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:2}}>Team Members</div>
          <div style={{fontSize:10,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>

        <button onClick={()=>{setShowAddForm(v=>!v);setNewUser({fullName:"",email:"",dept:"",role:"Assessor"});}}

            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:5,letterSpacing:".08em"}}>INITIAL PASSWORD (user must change on first login)</div>
            <input value={newUser.initialPassword||""} onChange={e=>setNewUser(p=>({...p,initialPassword:e.target.value}))}

              cursor:newUser.fullName.trim()&&newUser.email.trim()&&newUser.dept.trim()?"pointer":"not-allowed",
              fontFamily:"'Space Grotesk',sans-serif"}}>
          {addErr&&<div style={{padding:"7px 10px",background:C.red+"15",border:`1px solid ${C.red}44`,borderRadius:6,fontSize:10,color:C.red,marginBottom:10}}>{addErr}</div>}

          <button onClick={()=>{setShowAddForm(false);setNewUser({fullName:"",email:"",dept:"",role:"Assessor"});}}

          <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:3}}>Remove {appUsers.find(u=>u.id===confirmRemove)?.fullName}?</div>

        <button onClick={()=>removeUser(confirmRemove)} style={{background:C.red+"33",border:`1px solid ${C.red+"66"}`,color:C.red,borderRadius:7,padding:"7px 16px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>Remove</button>

              {/* Action buttons */}
