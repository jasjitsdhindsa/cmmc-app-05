function AssessmentStatus({resp,owners,customQs}){
  const [view,setView]=useState("domains");
  const [drill,setDrill]=useState(null);       // side panel: {type, payload}
  const [expandedRow,setExpandedRow]=useState(null); // inline domain question expansion
  const TARGET=3.0;

  // ── Domain status computation ──────────────────────────────────────────────
  const domainStatus=DOMAINS.map(d=>{
    const r=resp[d.id]||{};
    const stdAns=d.qs.filter((_,i)=>resp[d.id]?.[i]!==undefined).length;
    const cqs=(customQs&&customQs[d.id])||[];
    const cstAns=cqs.filter((_,i)=>resp[d.id]?.['c'+i]!==undefined).length;
    const answered=stdAns+cstAns;
    const totalQs=d.qs.length+cqs.length;
    const score=dScore(resp,d.id,customQs);
    const pct=dPct(resp,d.id,customQs);
    const owner=USERS.find(u=>u.id===owners[d.id]);
    let status="Not Started";
    if(pct===1.0)status="Completed";
    else if(answered>0)status="In Progress";
    return{...d,answered,totalQs,cqs,score,pct,owner,status};
  });

  const completed=domainStatus.filter(d=>d.status==="Completed");
  const inProgress=domainStatus.filter(d=>d.status==="In Progress");
  const notStarted=domainStatus.filter(d=>d.status==="Not Started");
  const l3Ready=domainStatus.filter(d=>d.score!==null&&d.score>=TARGET);
  const overallPct=Math.round((domainStatus.reduce((a,d)=>a+d.pct,0)/DOMAINS.length)*100);
  const totalQsAns=domainStatus.reduce((a,d)=>a+d.answered,0);
  const totalQsAll=domainStatus.reduce((a,d)=>a+d.totalQs,0);

  // ── Assessor stats ─────────────────────────────────────────────────────────
  const assessors=USERS.filter(u=>u.role==="Assessor"||u.role==="Admin");
  const assessorStats=assessors.map(u=>{
    const assigned=DOMAINS.filter(d=>owners[d.id]===u.id);
    const cqs2=customQs||{};
    const aStatus=assigned.map(d=>{
      const cq=(cqs2[d.id]||[]);
      const stdA=d.qs.filter((_,i)=>resp[d.id]?.[i]!==undefined).length;
      const cstA=cq.filter((_,i)=>resp[d.id]?.['c'+i]!==undefined).length;
      const ans=stdA+cstA;
      const tot=d.qs.length+cq.length;
      let st="Not Started";
      if(tot>0&&ans===tot)st="Completed";
      else if(ans>0)st="In Progress";
      return{...d,answered:ans,totalQs:tot,status:st};
    });
    const done=aStatus.filter(d=>d.status==="Completed").length;
    const prog=aStatus.filter(d=>d.status==="In Progress").length;
    const ns=aStatus.filter(d=>d.status==="Not Started").length;
    const totalAns=aStatus.reduce((a,d)=>a+d.answered,0);
    const totalQs=aStatus.reduce((a,d)=>a+d.totalQs,0);
    const pct=totalQs>0?Math.round((totalAns/totalQs)*100):0;
    return{...u,assigned,aStatus,done,prog,ns,totalAns,totalQs,pct};
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  const stC={Completed:{color:C.green,bg:C.green+"22",border:C.green+"44",icon:"✓"},InProgress:{color:C.amber,bg:C.amber+"22",border:C.amber+"44",icon:"◑"},NotStarted:{color:C.sub,bg:"#163d5a",border:C.border,icon:"○"}};
  const StBadge=({status})=>{const key=status.replace(" ","");const s=stC[key]||stC["NotStarted"];return<span style={{display:"inline-flex",alignItems:"center",gap:4,borderRadius:20,padding:"2px 9px",fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:s.bg,color:s.color,border:`1px solid ${s.border}`}}>{s.icon} {status}</span>;};
  const Ring=({pct,size=60,color})=>{const r=size/2-4,circ=2*Math.PI*r,dash=circ*(pct/100);return<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={4}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={4} strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/><text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={size*.2} fontWeight={700} fontFamily="'Syne',sans-serif">{pct}%</text></svg>;};
  const TabBtn=({id,label})=><button onClick={()=>{setView(id);setDrill(null);setExpandedRow(null);}} style={{background:view===id?"#0f3258":C.card,border:`1px solid ${view===id?C.accent+"55":C.border}`,color:view===id?C.accent:C.sub,borderRadius:8,padding:"7px 15px",fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"'Space Grotesk',sans-serif"}}>{label}</button>;

  // ── Clickable KPI card ─────────────────────────────────────────────────────
  const KPIc=({label,val,unit,color,sub,drillKey,count})=>{
    const active=drill?.type===drillKey;
    return<div onClick={()=>count>0?setDrill(d=>d?.type===drillKey?null:{type:drillKey}):null}
      style={{background:active?"#0f3258":C.card,border:`1px solid ${active?C.accent+"88":C.border}`,borderRadius:12,padding:"14px 16px",flex:1,minWidth:100,cursor:count>0?"pointer":"default",transition:"all .18s",position:"relative"}}
      onMouseEnter={e=>{if(count>0){e.currentTarget.style.borderColor=C.accent+"55";e.currentTarget.style.transform="translateY(-2px)";}}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=active?C.accent+"88":C.border;e.currentTarget.style.transform="none";}}>
      <div style={{fontSize:10,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".08em",marginBottom:5,display:"flex",justifyContent:"space-between"}}>
        <span>{label}</span>
        {count>0&&<span style={{color:C.accent+"88",fontSize:9}}>click ↗</span>}
      </div>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:color||C.text,lineHeight:1}}>{val}<span style={{fontSize:10,fontWeight:400,color:C.sub,marginLeft:2}}>{unit}</span></div>
      {sub&&<div style={{fontSize:10,color:C.sub,marginTop:4,lineHeight:1.4}}>{sub}</div>}
    </div>;
  };

  // ── Side drill panel content ───────────────────────────────────────────────
  const DrillContent=()=>{
    if(!drill)return null;
    const {type,payload}=drill;

    // Helper: mini domain card used in several drill panels
    const MiniDomainCard=({d,showQuestions=false})=>{
      const lv=d.score!==null?lf(d.score):null;
      const gap=d.score!==null?Math.max(0,TARGET-d.score):null;
      const stKey=d.status.replace(" ","");const st=stC[stKey]||stC.NotStarted;
      return<div style={{background:C.card,border:`1px solid ${lv?lv.color+"33":C.border}`,borderRadius:10,padding:"11px 13px",marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showQuestions?8:0}}>
          <span style={{fontSize:16}}>{d.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:11,color:C.text}}>{d.code} — {d.name}</div>
            <div style={{fontSize:9,color:C.sub,marginTop:1,fontFamily:"'JetBrains Mono',monospace"}}>{d.cat} · {d.answered}/{d.totalQs} answered</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:lv?.color||C.sub}}>{d.score!==null?d.score.toFixed(1):"—"}</span>
            <StBadge status={d.status}/>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:4,background:"#0f2d47",borderRadius:3,overflow:"hidden",margin:"6px 0 4px"}}>
          <div style={{height:"100%",width:`${Math.round(d.pct*100)}%`,background:st.color,borderRadius:3}}/>
        </div>
        {/* Owner + gap */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            {d.owner?<span style={{display:"flex",alignItems:"center",gap:5}}><Av u={d.owner} sz={14}/><span style={{fontSize:8,color:C.sub}}>{d.owner.fullName}</span></span>:<span style={{fontSize:8,color:C.sub}}>Unassigned</span>}
          </div>
          {gap!==null&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:gap===0?C.green:C.amber,fontWeight:700}}>{gap===0?"✓ At target":`+${gap.toFixed(1)} to L3`}</span>}
        </div>
        {/* Question breakdown when requested */}
        {showQuestions&&<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em",marginBottom:6}}>QUESTION RATINGS</div>
          {d.qs.map((q2,qi)=>{
            const sc=resp[d.id]?.[qi];
            const qlv=sc!==undefined?lf(sc):null;
            const hasCmt=!!(resp[d.id]?.['cmt_'+qi]);
            const hasEv=(resp[d.id]?.['ev_'+qi]||[]).length>0;
            return<div key={qi} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",borderBottom:`1px solid ${C.border}22`}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:qlv?qlv.bg:"#0f2d4722",border:`1.5px solid ${qlv?qlv.color:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:qlv?qlv.color:C.sub,flexShrink:0}}>
                {sc!==undefined?sc.toFixed(1):"—"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:1}}>[{q2.ctrl}]</div>
                <div style={{fontSize:9,color:sc!==undefined?C.text:C.sub,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{q2.text}</div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                {hasCmt&&<span title="Has comment" style={{fontSize:9,color:C.blue}}>💬</span>}
                {hasEv&&<span title="Has evidence" style={{fontSize:9,color:C.green}}>📎</span>}
                {qlv&&<span style={{display:"inline-flex",borderRadius:20,padding:"1px 6px",fontSize:7,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:qlv.bg,color:qlv.color,border:`1px solid ${qlv.color}44`}}>{qlv.short}</span>}
              </div>
            </div>;
          })}
          {/* Custom questions */}
          {d.cqs&&d.cqs.length>0&&<div>
            <div style={{fontSize:8,color:C.amber,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em",margin:"8px 0 4px"}}>CUSTOM QUESTIONS</div>
            {d.cqs.map((q2,qi)=>{
              const sc=resp[d.id]?.['c'+qi];
              const qlv=sc!==undefined?lf(sc):null;
              return<div key={'c'+qi} style={{display:"flex",alignItems:"center",gap:7,padding:"4px 0",borderBottom:`1px solid ${C.border}22`}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:qlv?qlv.bg:C.amber+"15",border:`1.5px solid ${qlv?qlv.color:C.amber+"44"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:qlv?qlv.color:C.amber,flexShrink:0}}>
                  {sc!==undefined?sc.toFixed(1):"★"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:9,color:C.amber,fontFamily:"'JetBrains Mono',monospace",marginBottom:1}}>[{q2.ctrl}] CUSTOM</div>
                  <div style={{fontSize:9,color:sc!==undefined?C.text:C.sub,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{q2.text}</div>
                </div>
                {qlv&&<span style={{display:"inline-flex",borderRadius:20,padding:"1px 6px",fontSize:7,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:qlv.bg,color:qlv.color,border:`1px solid ${qlv.color}44`,flexShrink:0}}>{qlv.short}</span>}
              </div>;
            })}
          </div>}
        </div>}
      </div>;
    };

    const PanelHdr=({title,sub,count})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
      <div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,color:C.text}}>{title}</div>
        {sub&&<div style={{fontSize:9,color:C.sub,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>{sub}</div>}
      </div>
      <button onClick={()=>setDrill(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>✕</button>
    </div>;

    // KPI drill-downs: filtered domain lists
    if(type==="kpi_completed")return<div>
      <PanelHdr title="Completed Domains" sub={`${completed.length} of 14 domains fully assessed`}/>
      {completed.length===0?<div style={{textAlign:"center",color:C.sub,fontSize:11,padding:20}}>No completed domains yet</div>:completed.map(d=><MiniDomainCard key={d.id} d={d} showQuestions={true}/>)}
    </div>;

    if(type==="kpi_inprogress")return<div>
      <PanelHdr title="In Progress Domains" sub={`${inProgress.length} domains partially answered`}/>
      {inProgress.length===0?<div style={{textAlign:"center",color:C.sub,fontSize:11,padding:20}}>No in-progress domains</div>:inProgress.map(d=><MiniDomainCard key={d.id} d={d} showQuestions={true}/>)}
    </div>;

    if(type==="kpi_notstarted")return<div>
      <PanelHdr title="Not Started Domains" sub={`${notStarted.length} domains with no answers yet`}/>
      {notStarted.length===0?<div style={{textAlign:"center",color:C.green,fontSize:11,padding:20}}>✓ All domains have been started!</div>:notStarted.map(d=><MiniDomainCard key={d.id} d={d}/>)}
    </div>;

    if(type==="kpi_l3ready")return<div>
      <PanelHdr title="Domains at or Above L3" sub={`${l3Ready.length} domains meeting the target`}/>
      {l3Ready.length===0?<div style={{textAlign:"center",color:C.sub,fontSize:11,padding:20}}>No domains at L3 yet</div>:l3Ready.map(d=><MiniDomainCard key={d.id} d={d} showQuestions={false}/>)}
    </div>;

    // Category drill-down
    if(type==="category"){
      const catDs=domainStatus.filter(d=>d.cat===payload);
      const catColor={Governance:C.purple,Technical:C.cyan,Operations:C.amber,People:C.green,Physical:C.red}[payload]||C.sub;
      return<div>
        <PanelHdr title={`${payload} Domains`} sub={`${catDs.filter(d=>d.status==="Completed").length}/${catDs.length} completed`}/>
        {catDs.map(d=><MiniDomainCard key={d.id} d={d} showQuestions={true}/>)}
      </div>;
    }

    // Domain detail drill-down
    if(type==="domain"){
      const d=domainStatus.find(x=>x.id===payload);
      if(!d)return null;
      const lv=d.score!==null?lf(d.score):null;
      const b=BENCH.domains[d.id];
      return<div>
        <PanelHdr title={d.name} sub={`${d.code} · ${d.cat} · ${d.answered}/${d.totalQs} questions answered`}/>
        {/* Score + gauge mini */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
          <div style={{background:C.surface,border:`1px solid ${lv?lv.color+"44":C.border}`,borderRadius:9,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>DOMAIN SCORE</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:lv?.color||C.sub}}>{d.score!==null?d.score.toFixed(1):"—"}</div>
            {lv&&<div style={{fontSize:9,color:lv.color,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{lv.short} {lv.label}</div>}
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>COMPLETION</div>
            <Ring pct={Math.round(d.pct*100)} size={60} color={d.status==="Completed"?C.green:C.amber}/>
          </div>
        </div>
        {/* Benchmark row */}
        {b&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:9,fontFamily:"'JetBrains Mono',monospace",display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>Industry Q1: <strong style={{color:C.red}}>{b.q1}</strong></span>
          <span>Median: <strong style={{color:C.blue}}>{b.median}</strong></span>
          <span>Q3: <strong style={{color:C.green}}>{b.q3}</strong></span>
          <span>Top 10%: <strong style={{color:C.cyan}}>{b.top10}</strong></span>
        </div>}
        {/* Owner */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"8px 12px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8}}>
          <span style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>ASSIGNED TO:</span>
          {d.owner?<span style={{display:"flex",alignItems:"center",gap:8}}><Av u={d.owner} sz={22}/><span style={{fontSize:11,fontWeight:600,color:C.text}}>{d.owner.fullName}</span><span style={{fontSize:9,color:C.sub}}>({d.owner.role})</span></span>:<span style={{fontSize:11,color:C.sub}}>Unassigned</span>}
        </div>
        {/* All questions */}
        <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em",marginBottom:8}}>ALL QUESTIONS ({d.qs.length} standard{d.cqs.length>0?` + ${d.cqs.length} custom`:""})</div>
        {d.qs.map((q2,qi)=>{
          const sc=resp[d.id]?.[qi];
          const qlv=sc!==undefined?lf(sc):null;
          const hasCmt=!!(resp[d.id]?.['cmt_'+qi]);
          const hasEv=(resp[d.id]?.['ev_'+qi]||[]).length>0;
          const cmtText=resp[d.id]?.['cmt_'+qi]||'';
          const evList=resp[d.id]?.['ev_'+qi]||[];
          return<div key={qi} style={{background:C.card,border:`1px solid ${qlv?qlv.color+"33":C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:7}}>
            <div style={{display:"flex",gap:8,marginBottom:hasCmt||hasEv?8:0}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:qlv?qlv.bg:"#0f2d4722",border:`1.5px solid ${qlv?qlv.color:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:qlv?qlv.color:C.sub,flexShrink:0}}>
                {sc!==undefined?sc.toFixed(1):"—"}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>[{q2.ctrl}] Q{qi+1}</div>
                <div style={{fontSize:10,color:C.text,lineHeight:1.5}}>{q2.text}</div>
                {qlv&&<div style={{marginTop:4,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{display:"inline-flex",borderRadius:20,padding:"1px 7px",fontSize:8,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:qlv.bg,color:qlv.color,border:`1px solid ${qlv.color}44`}}>{qlv.short} {qlv.label}</span>
                  <span style={{fontSize:8,color:qlv.color,fontFamily:"'JetBrains Mono',monospace"}}>{sc.toFixed(1)} / 5.0</span>
                </div>}
              </div>
            </div>
            {hasCmt&&<div style={{marginTop:6,padding:"7px 9px",background:"#071726",border:`1px solid ${C.blue+"33"}`,borderRadius:6}}>
              <div style={{fontSize:8,color:C.blue,fontFamily:"'JetBrains Mono',monospace",marginBottom:3}}>💬 COMMENT</div>
              <div style={{fontSize:10,color:C.text,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{cmtText}</div>
            </div>}
            {hasEv&&<div style={{marginTop:5,display:"flex",gap:6,flexWrap:"wrap"}}>
              {evList.map((ev,ei)=><div key={ei} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 8px",background:C.surface,border:`1px solid ${C.green+"33"}`,borderRadius:5}}>
                <span style={{fontSize:10}}>{ev.type?.startsWith("image")?"🖼️":ev.type?.includes("pdf")?"📄":"📎"}</span>
                <span style={{fontSize:8,color:C.green}}>{ev.name}</span>
                <a href={ev.data} download={ev.name} style={{color:C.cyan,fontSize:8,textDecoration:"none"}}>⬇</a>
              </div>)}
            </div>}
          </div>;
        })}
        {/* Custom questions in domain drill */}
        {d.cqs.length>0&&<div>
          <div style={{fontSize:9,color:C.amber,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em",margin:"10px 0 8px"}}>CUSTOM QUESTIONS</div>
          {d.cqs.map((q2,qi)=>{
            const sc=resp[d.id]?.['c'+qi];
            const qlv=sc!==undefined?lf(sc):null;
            return<div key={'c'+qi} style={{background:C.card,border:`1px solid ${C.amber+"33"}`,borderRadius:8,padding:"10px 12px",marginBottom:7}}>
              <div style={{display:"flex",gap:8}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:qlv?qlv.bg:C.amber+"15",border:`1.5px solid ${qlv?qlv.color:C.amber+"44"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:qlv?qlv.color:C.amber,flexShrink:0}}>{sc!==undefined?sc.toFixed(1):"★"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:8,color:C.amber,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>[{q2.ctrl}] CUSTOM</div>
                  <div style={{fontSize:10,color:C.text,lineHeight:1.5}}>{q2.text}</div>
                </div>
              </div>
            </div>;
          })}
        </div>}
      </div>;
    }

    // Assessor drill-down
    if(type==="assessor"){
      const u=assessorStats.find(x=>x.id===payload);
      if(!u)return null;
      const rc=RC[u.role];
      return<div>
        <PanelHdr title={`${u.fullName}'s Assessment`} sub={`${u.done} completed · ${u.prog} in progress · ${u.ns} pending`}/>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:C.surface,border:`1px solid ${u.color}33`,borderRadius:10,marginBottom:14}}>
          <Av u={u} sz={44}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:3}}>{u.fullName}</div>
            <span style={{display:"inline-flex",alignItems:"center",gap:4,borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",background:rc.bg,color:rc.color,border:`1px solid ${rc.border}`}}>{rc.icon} {u.role}</span>
          </div>
          <Ring pct={u.pct} size={64} color={u.pct===100?C.green:u.color}/>
        </div>
        {/* Stat pills */}
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["Done",u.done,C.green],["In Progress",u.prog,C.amber],["Pending",u.ns,C.sub]].map(([label,val,col])=>(
            <div key={label} style={{flex:1,textAlign:"center",padding:"8px",background:col+"12",border:`1px solid ${col}33`,borderRadius:8}}>
              <div style={{fontWeight:700,fontSize:18,color:col}}>{val}</div>
              <div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{label.toUpperCase()}</div>
            </div>
          ))}
        </div>
        {/* Domain-by-domain for this assessor */}
        {u.aStatus.length===0?<div style={{textAlign:"center",color:C.sub,fontSize:11,padding:20}}>No domains assigned</div>
          :u.aStatus.map(d=>{
            const fullD=domainStatus.find(x=>x.id===d.id);
            return fullD?<MiniDomainCard key={d.id} d={{...fullD,...d}} showQuestions={true}/>:null;
          })}

// ── IMPORT / EXPORT HELPERS ───────────────────────────────────────────────────
function exportQsCSV(assessment){
  // Full export of every question with score and comment.
  // Evidence files are intentionally NOT exported here — even file metadata
  // would clutter the spreadsheet. Users wanting evidence access should use
  // Storage Explorer or the Azure portal directly.
  const rows=[[
    "AssessmentName","AssessmentQuarter","AssessmentYear",
    "DomainCategory","DomainCode","DomainName",
    "ControlRef","QuestionText","IsCustom",
    "CurrentScore","Comment"
  ]];
  DOMAINS.forEach(d=>{
    const dResp = assessment.resp?.[d.id] || {};
    // Standard ISO questions
    d.qs.forEach((q2,qi)=>{
      const score = dResp[qi] ?? '';
      const comment = dResp['cmt_'+qi] || '';
      rows.push([
        assessment.name, assessment.quarter, assessment.year,
        d.cat, d.code, d.name,
        q2.ctrl, q2.text, 'No',
        score, comment
      ]);
    });
    // Custom questions
    (assessment.customQs?.[d.id]||[]).forEach((q2,qi)=>{
      const score = dResp['c'+qi] ?? '';
      const comment = dResp['cmt_c'+qi] || '';
      rows.push([
        assessment.name, assessment.quarter, assessment.year,
        d.cat, d.code, d.name,
        q2.ctrl, q2.text, 'Yes',
        score, comment
      ]);
    });
  });
  // Build CSV with proper escaping. Each cell is wrapped in double quotes;
  // any embedded double quote is doubled (RFC 4180).
  const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  // Prepend a UTF-8 BOM so Excel auto-detects encoding correctly for any
  // accented characters, smart quotes, or non-ASCII content in comments.
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `CMMC_${assessment.name.replace(/\s+/g,'_')}_Questions_Full.csv`;
  a.style.display = "none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(a.href);}, 100);
}

function exportTemplate(){
  // Template uses the SAME column layout as the full export so users can
  // round-trip: download full export → edit in Excel → re-import.
  const rows=[[
    "DomainCategory","DomainCode","DomainName",
    "ControlRef","QuestionText","IsCustom(Yes to import as custom)",
    "CurrentScore (0-5, optional)","Comment (optional)"
  ]];
  DOMAINS.forEach(d=>{
    // Standard ISO questions — kept as reference rows. Users can fill in score
    // and comment columns and re-import to bulk-update.
    d.qs.forEach(q2=>rows.push([
      d.cat, d.code, d.name,
      q2.ctrl, q2.text, 'No',
      '', ''           // score and comment blank for user to fill in
    ]));
    // Show one example custom-question row per domain so the user knows the
    // expected format. The "[ADD YOUR CUSTOM QUESTION HERE]" placeholder must
    // be replaced or the row will be silently rejected at import.
    rows.push([
      d.cat, d.code, d.name,
      'A.'+d.code.replace('A.','')+'x',
      '[ADD YOUR CUSTOM QUESTION HERE]', 'Yes',
      '', ''
    ]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CMMC_Question_Import_Template.csv';
  a.style.display = "none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(a.href);}, 100);
}

function parseImportCSV(text,existingAssessment){
  // Strip UTF-8 BOM if present (Excel adds one when saving as CSV UTF-8)
  if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
  const lines = text.replace(/\r\n/g,'\n').split('\n');
  // Proper RFC 4180 CSV parser — handles quoted fields, embedded commas,
  // escaped double-quotes, and embedded newlines within quoted fields.
  const parseRow = (l) => {
    const r=[]; let inQ=false, cur='';
    for(let i=0; i<l.length; i++){
      const c=l[i];
      if(c==='"'){
        if(inQ && l[i+1]==='"'){ cur+='"'; i++; } else inQ=!inQ;
      } else if(c===',' && !inQ){
        r.push(cur); cur='';
      } else cur+=c;
    }
    r.push(cur);
    return r.map(s=>s.trim());
  };
  if(!lines.length) return {newCustomQs:existingAssessment.customQs||{}, newResp:existingAssessment.resp||{}, added:0, updated:0, skipped:0};
  const header = parseRow(lines[0]).map(h=>h.replace(/"/g,'').toLowerCase().trim());
  // Find a column whose header CONTAINS the given keyword. Returns -1 if none.
  // First match wins; this lets old templates (with shorter headers) work too.
  const findCol = (keyword) => header.findIndex(h => h.includes(keyword));
  const codeIdx    = findCol('code');
  const ctrlIdx    = findCol('ctrl') >= 0 ? findCol('ctrl') : findCol('ref');
  const textIdx    = findCol('question') >= 0 ? findCol('question') : findCol('text');
  const customIdx  = findCol('custom');
  const scoreIdx   = findCol('score');     // -1 if old template — fine
  const commentIdx = findCol('comment');   // -1 if old template — fine
  if(codeIdx < 0 || textIdx < 0 || customIdx < 0){
    return {newCustomQs:existingAssessment.customQs||{}, newResp:existingAssessment.resp||{}, added:0, updated:0, skipped:0, error:"CSV is missing required columns. The file must have at least: DomainCode, QuestionText, IsCustom. Use the Download Import Template button for a correctly-formatted file."};
  }
  // Deep-clone resp and customQs so we don't mutate state directly. The custom
  // questions structure is small; resp contains the user's progress and must
  // be cloned carefully to preserve evidence arrays.
  const newCustomQs = JSON.parse(JSON.stringify(existingAssessment.customQs||{}));
  const newResp     = JSON.parse(JSON.stringify(existingAssessment.resp||{}));
  let added=0, updated=0, skipped=0;

  // Build a quick map of existing custom question texts per domain, for dedup
  const customTextMap = {};
  Object.keys(newCustomQs).forEach(did => {
    customTextMap[did] = new Set((newCustomQs[did]||[]).map(q=>q.text));
  });

  // Parse a numeric score field; return undefined if blank/invalid/out-of-range
  const parseScore = (s) => {
    const t = String(s||'').trim();
    if(!t) return undefined;
    const n = parseFloat(t);
    if(!isFinite(n) || n < 0 || n > 5) return undefined;
    return n;
  };

  for(let li=1; li<lines.length; li++){
    const line = lines[li];
    if(!line.trim()) continue;
    const r = parseRow(line);
    const code     = (r[codeIdx]   || '').replace(/"/g,'').trim();
    const ctrl     = (r[ctrlIdx]   || '').replace(/"/g,'').trim();
    const qtext    = (r[textIdx]   || '').replace(/"/g,'').trim();
    const isCustom = (r[customIdx] || '').replace(/"/g,'').trim().toLowerCase() === 'yes';
    const csvScore   = scoreIdx   >= 0 ? parseScore(r[scoreIdx])                      : undefined;
    const csvComment = commentIdx >= 0 ? (r[commentIdx]||'').replace(/^"|"$/g,'').trim() : '';

    // Reject rows missing the basics or with the placeholder text untouched
    if(!code || !qtext || qtext === '[ADD YOUR CUSTOM QUESTION HERE]'){ skipped++; continue; }
    const domain = DOMAINS.find(d => d.code===code || d.id===code);
    if(!domain){ skipped++; continue; }
    const did = domain.id;
    if(!newResp[did]) newResp[did] = {};

    if(isCustom){
      // ── CUSTOM QUESTION ──────────────────────────────────────────────
      if(!newCustomQs[did]) newCustomQs[did] = [];
      if(!customTextMap[did]) customTextMap[did] = new Set();
      let customIndex;
      if(customTextMap[did].has(qtext)){
        // Custom question with this text already exists — update its score/comment
        customIndex = newCustomQs[did].findIndex(q => q.text === qtext);
        if(customIndex < 0){ skipped++; continue; }
        if(csvScore !== undefined){ newResp[did]['c'+customIndex] = csvScore; updated++; }
        if(csvComment){ newResp[did]['cmt_c'+customIndex] = csvComment; if(csvScore===undefined) updated++; }
        if(csvScore===undefined && !csvComment) skipped++;
      } else {
        // Brand new custom question
        newCustomQs[did].push({ ctrl: ctrl || 'Custom', text: qtext });
        customTextMap[did].add(qtext);
        customIndex = newCustomQs[did].length - 1;
        if(csvScore !== undefined) newResp[did]['c'+customIndex] = csvScore;
        if(csvComment) newResp[did]['cmt_c'+customIndex] = csvComment;
        added++;
      }
    } else {
      // ── STANDARD ISO QUESTION ────────────────────────────────────────
      // Match on question text (we don't trust the row order in a re-imported
      // file). If the standard question doesn't exist, skip — we never modify
      // the canonical ISO question list at runtime.
      const stdIndex = domain.qs.findIndex(sq => sq.text === qtext);
      if(stdIndex < 0){ skipped++; continue; }
      let didUpdate = false;
      if(csvScore !== undefined){ newResp[did][stdIndex] = csvScore; didUpdate = true; }
      if(csvComment){ newResp[did]['cmt_'+stdIndex] = csvComment; didUpdate = true; }
      if(didUpdate) updated++;
      else skipped++;
    }
  }

  return { newCustomQs, newResp, added, updated, skipped };
}

function AssessmentsPage({assessments,activeId,onSelect,onCreate,onUpdate,onDelete,user,activeResp,activeCustomQs}){
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:'',quarter:'Q1',year:new Date().getFullYear(),scope:'Full ISO 27001:2022',notes:'',carryFrom:''});
  const [submitTarget,setSubmitTarget]=useState(null);
  // ── Filter / Search state ──────────────────────────────────────────────────
  const [search,setSearch]=useState('');
  const [filterYear,setFilterYear]=useState('ALL');
  const [filterQtr,setFilterQtr]=useState('ALL');
  const [showDownload,setShowDownload]=useState(null); // assessment id

  const QUARTERS=['Q1','Q2','Q3','Q4'];
  // Always show a full range of years so users can filter historical assessments
  const currentYear=new Date().getFullYear();
  const allYears=Array.from({length:currentYear-2021},(_,i)=>String(currentYear-i)); // e.g. 2026, 2025, 2024, 2023, 2022
  const YEARS_NEW=Array.from({length:5},(_,i)=>new Date().getFullYear()-1+i);

  // ── Filtered list ──────────────────────────────────────────────────────────
  const filtered=assessments.filter(a=>{
    if(filterYear!=='ALL'&&String(a.year)!==filterYear)return false;
    if(filterQtr!=='ALL'&&a.quarter!==filterQtr)return false;
    if(search.trim()&&!a.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const openNew=()=>{
    const q=QUARTERS[Math.floor((new Date().getMonth())/3)];
    const y=new Date().getFullYear();
    setForm({name:`FY${y} ${q} Assessment`,quarter:q,year:y,scope:'Full ISO 27001:2022',notes:'',carryFrom:''});
    setEditing(null);setShowForm(true);
  };
  const openEdit=a=>{setForm({name:a.name,quarter:a.quarter,year:a.year,scope:a.scope||'Full ISO 27001:2022',notes:a.notes||'',carryFrom:''});setEditing(a.id);setShowForm(true);};
  const submit=()=>{
    if(!form.name.trim())return;
    if(editing){onUpdate(editing,form);}
    else{
      const src=form.carryFrom?assessments.find(a=>a.id===form.carryFrom):null;
      const baseResp=src?JSON.parse(JSON.stringify(src.resp||{})):JSON.parse(JSON.stringify(IRESP));
      if(src){Object.keys(baseResp).forEach(did=>{if(baseResp[did])Object.keys(baseResp[did]).forEach(k=>{if(k.startsWith('cmt_')||k.startsWith('ev_'))delete baseResp[did][k];});});}
      const baseCQs=src?JSON.parse(JSON.stringify(src.customQs||{})):{};
      onCreate({...form,id:'a'+Date.now(),resp:baseResp,customQs:baseCQs,created:new Date().toISOString()});
    }
    setShowForm(false);
  };

  const statColor=a=>{const s=oScore(a.resp);return s===null?C.sub:lf(s)?.color||C.sub;};
  const completedDomains=a=>DOMAINS.filter(d=>dScore(a.resp,d.id,a.customQs)!==null).length;
  const customQCount=a=>Object.values(a.customQs||{}).reduce((s,arr)=>s+arr.length,0);

  // ── Excel/CSV download for any assessment ─────────────────────────────────
  const downloadExcel=(a)=>{
    const resp=a.id===activeId?activeResp:a.resp||{};
    const cqs=a.id===activeId?activeCustomQs:a.customQs||{};
    const overallSc=oScore(resp,cqs);
    const overallLv=overallSc!==null?lf(overallSc):null;

    // Build HTML table for Excel compatibility
    const rows=[];
    // Summary header
    rows.push(['CYBERSECURITY MATURITY ASSESSMENT — RESULTS EXPORT','','','','','','']);
    rows.push([`Assessment: ${a.name}`,'','','','','','']);
    rows.push([`Period: ${a.quarter} ${a.year}`,'','','','','','']);
    rows.push([`Overall Score: ${overallSc!==null?overallSc.toFixed(2):'Not Started'}`,'','',`CMMC Level: ${overallLv?overallLv.label:'—'}`,'','','']);
    rows.push([`Submitted: ${a.submitted?'Yes — '+new Date(a.submittedAt||'').toLocaleDateString():'No'}`,'','','','','','']);
    rows.push(['','','','','','','']);
    rows.push(['Domain','Control Ref','Question','Score','CMMC Level','Status','Comment']);
    rows.push(['','','','','','','']);

    DOMAINS.forEach(d=>{
      const dSc=dScore(resp,d.id,cqs);
      const dLv=dSc!==null?lf(dSc):null;
      const cqList=cqs[d.id]||[];
      const totalQs=d.qs.length+cqList.length;
      const answeredStd=d.qs.filter((_,i)=>resp[d.id]?.[i]!==undefined).length;
      const answeredCst=cqList.filter((_,i)=>resp[d.id]?.['c'+i]!==undefined).length;
      const answered=answeredStd+answeredCst;
      // Domain summary row
      rows.push([`${d.code} — ${d.name}`,`${d.cat}`,`${answered}/${totalQs} questions answered`,dSc!==null?dSc.toFixed(2):'—',dLv?dLv.label:'Not Started','','']);
      // Question rows
      d.qs.forEach((q,qi)=>{
        const sc=resp[d.id]?.[qi];
        const lv=sc!==undefined?lf(sc):null;
        const cmt=(resp[d.id]?.['cmt_'+qi]||'').replace(/\r?\n/g,' ');
        const evCount=(resp[d.id]?.['ev_'+qi]||[]).length;
        rows.push(['',q.ctrl,q.text,sc!==undefined?sc:'',lv?`${lv.short} ${lv.label}`:'Not Answered',evCount>0?`${evCount} file(s) attached`:'',cmt]);
      });
      // Custom questions
      cqList.forEach((q,qi)=>{
        const sc=resp[d.id]?.['c'+qi];

      });

    // Build CSV with BOM (Excel-compatible)
    const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const el=document.createElement('a');

    document.body.appendChild(el);
    el.click();
    setTimeout(()=>{document.body.removeChild(el);URL.revokeObjectURL(el.href);},100);
    logAudit('DATA','Assessment Exported',`Exported: ${a.name} to Excel/CSV`,user);
  };

  const iS={background:'#071726',border:`1px solid ${C.border}`,borderRadius:7,padding:'7px 10px',color:C.text,fontSize:11,fontFamily:"'Space Grotesk',sans-serif",outline:'none'};

  return<div>
    {/* ── Top bar: title + new button ── */}

      </div>
      {user.role!=='Auditor'&&<button onClick={openNew} style={{background:'linear-gradient(135deg,#005f8a,#00d4ff)',color:'#02111e',border:'none',borderRadius:8,padding:'9px 18px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Space Grotesk',sans-serif"}}>+ New Assessment Cycle</button>}
    </div>

    {/* ── Filter / Search bar ── */}
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:'12px 14px',marginBottom:16}}>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
        {/* Search */}
        <div style={{flex:'1 1 200px'}}>
          <div style={{fontSize:8,color:C.sub,fontFamily:"'JetBrains Mono',monospace",marginBottom:4,letterSpacing:'.07em'}}>SEARCH ASSESSMENTS</div>
          <div style={{display:'flex',gap:7}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>{if(e.key==='Escape')setSearch('');}} placeholder="Search by name…" style={{...iS,flex:1}}/>

          </div>

        {/* Year */}
        <div style={{flex:'0 0 140px'}}>

          <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{...iS,width:'100%',cursor:'pointer'}}>
            <option value="ALL">All Years</option>

// ── IMPORT / EXPORT PANEL ─────────────────────────────────────────────────────
function ImportExportPanel({assessment,onUpdateCustomQs,onUpdateResp}){
  const [msg,setMsg]=useState(null);
  const [dragging,setDragging]=useState(false);
  const fileRef=React.useRef();
  const totalCustom=Object.values(assessment.customQs||{}).reduce((s,a)=>s+a.length,0);

  const handleFile=file=>{
    if(!file){setMsg({type:'error',text:'No file selected.'});return;}
    if(!/\.csv$/i.test(file.name)){setMsg({type:'error',text:'Please upload a .csv file (got: '+file.name+').'});return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const result=parseImportCSV(e.target.result,assessment);
      if(result.error){
        setMsg({type:'error',text:result.error});
        return;
      }
      const {newCustomQs,newResp,added,updated,skipped}=result;
      // Apply both updates. If onUpdateResp isn't provided (older callsite),
      // we still update customQs but skip score/comment imports.
      onUpdateCustomQs(newCustomQs);
      if(onUpdateResp) onUpdateResp(newResp);
      const parts=[];
      if(added)   parts.push(`${added} new custom question${added!==1?'s':''} added`);
      if(updated) parts.push(`${updated} score${updated!==1?'s':''}/comment${updated!==1?'s':''} updated`);
      if(skipped) parts.push(`${skipped} row${skipped!==1?'s':''} skipped (no change, duplicate, or invalid)`);
      const summary = parts.length ? parts.join(' · ') : 'No changes detected.';
      setMsg({type:'success',text:`✓ Import complete: ${summary}`});
    };
    reader.onerror=()=>setMsg({type:'error',text:'Failed to read file. The file may be corrupt or too large.'});
    reader.readAsText(file);
  };

  return<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px",marginBottom:14}}>
    <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:6}}>📥 Import / Export Questions</div>
    <div style={{fontSize:10,color:C.sub,marginBottom:12,lineHeight:1.6}}>
      Export captures the full state per question: <strong style={{color:C.text}}>score and comment</strong>. Import accepts the same fields. Evidence files are not included in CSV — use the question UI to upload or download files.
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
      <button onClick={()=>exportQsCSV(assessment)} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:"10px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,display:"flex",alignItems:"center",gap:7,justifyContent:"center"}}>📤 Export All Questions</button>
      <button onClick={exportTemplate} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:"10px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,display:"flex",alignItems:"center",gap:7,justifyContent:"center"}}>📋 Download Import Template</button>
      <button onClick={()=>fileRef.current.click()} style={{background:"linear-gradient(135deg,#005f8a,#00d4ff)",color:"#02111e",border:"none",borderRadius:8,padding:"10px 12px",fontSize:11,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:7,justifyContent:"center"}}>📁 Import CSV File</button>
    </div>
    <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}}/>
    <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}} style={{border:`2px dashed ${dragging?C.cyan:C.border}`,borderRadius:9,padding:"16px",textAlign:"center",transition:"border-color .15s",background:dragging?"#00d4ff0a":"transparent"}}>
      <div style={{fontSize:22,marginBottom:6}}>📂</div>
      <div style={{fontSize:11,color:C.sub}}>Drag & drop a CSV file here, or use <span style={{color:C.cyan,cursor:"pointer"}} onClick={()=>fileRef.current.click()}>Import CSV File</span> above</div>
      <div style={{fontSize:9,color:"#163d5a",marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>Required columns: DomainCode, QuestionText, IsCustom · Optional: ControlRef, CurrentScore (0-5), Comment</div>
    </div>
    {msg&&<div style={{marginTop:10,padding:"8px 12px",background:msg.type==="success"?C.green+"15":C.red+"15",border:`1px solid ${msg.type==="success"?C.green+"44":C.red+"44"}`,borderRadius:7,fontSize:11,color:msg.type==="success"?C.green:C.red,whiteSpace:"pre-wrap",lineHeight:1.5}}>{msg.text}</div>}
    {totalCustom>0&&<div style={{marginTop:10,fontSize:10,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>ℹ️ This assessment has <strong style={{color:C.amber}}>{totalCustom} custom question{totalCustom!==1?'s':''}</strong> across all domains</div>}
  </div>;
}

function Shell({user,onLogout,appUsers,setAppUsers,aadCfg,setAadCfg,refreshUsers}){
  const INIT_ASS={id:'a1',name:`FY${new Date().getFullYear()} Q${Math.floor((new Date().getMonth())/3)+1} Assessment`,quarter:`Q${Math.floor((new Date().getMonth())/3)+1}`,year:new Date().getFullYear(),scope:'Full ISO 27001:2022',notes:'',resp:{...IRESP},customQs:{},created:new Date().toISOString()};
  const [assessments,setAssessments]=useState([INIT_ASS]);
  const [activeAssessId,setActiveAssessId]=useState('a1');
  // Defensive: if assessments somehow becomes empty (e.g. Azure returns corrupt
  // data, or a future code change deletes the last item), fall back to a fresh
  // INIT_ASS rather than crashing the whole app trying to read .resp on undefined.
  const activeAssess=assessments.find(a=>a.id===activeAssessId)||assessments[0]||INIT_ASS;
  const resp=activeAssess.resp||{};
  const customQs=activeAssess.customQs||{};
  const setResp=updater=>setAssessments(prev=>prev.map(a=>a.id===activeAssessId?{...a,resp:typeof updater==='function'?updater(a.resp):updater}:a));
  const setCustomQs=nq=>setAssessments(prev=>prev.map(a=>a.id===activeAssessId?{...a,customQs:nq}:a));
  const [owners,setOwners]=useState(IOWN);
  const [showChangePw,setShowChangePw]=useState(false);
  // ── Server-backed state ────────────────────────────────────────────────────
  // azCfg/setAzCfg are kept as inert references purely so existing prop chains
  // (Shell -> SettingsPage -> AdminPage) don't break. The browser no longer
  // holds storage credentials.
  const azCfg=DEFAULT_AZ_CFG;
  const setAzCfg=()=>{};
  const [azStatus,setAzStatus]=useState("loading");  // loading | synced | error
  const [azError,setAzError]=useState("");
  const [azLastSync,setAzLastSync]=useState(null);

  // Initial load + 30 s polling so all users see each other's edits live.
  useEffect(()=>{
    let cancelled=false;
    let intervalId=null;
    const load=async(silent)=>{
      if(!silent)setAzStatus("loading");
      try{
        const r=await apiLoadState();
        if(cancelled)return;
        if(Array.isArray(r.assessments)&&r.assessments.length>0){
          setAssessments(prev=>{
            const a=JSON.stringify(prev.map(x=>({id:x.id,resp:x.resp,customQs:x.customQs})));
            const b=JSON.stringify(r.assessments.map(x=>({id:x.id,resp:x.resp,customQs:x.customQs})));
            return a===b?prev:r.assessments;
          });
          setActiveAssessId(prev=>r.assessments.find(a=>a.id===prev)?prev:r.assessments[0].id);
        }
        if(r.owners&&typeof r.owners==="object")setOwners(r.owners);
        setAzStatus("synced");setAzError("");setAzLastSync(new Date());
      }catch(e){
        if(cancelled)return;
        console.error("[state load]",e);
        setAzStatus("error");
        setAzError(e.status===401?"Your session expired — sign out and back in.":"Could not reach the server: "+(e.message||e));
      }
    };
    load(false);
    intervalId=setInterval(()=>load(true),30000);
    return()=>{cancelled=true;if(intervalId)clearInterval(intervalId);};
  },[]);

  const azRefresh=async()=>{
    setAzStatus("loading");
    try{
      const r=await apiLoadState();
      if(Array.isArray(r.assessments)&&r.assessments.length>0){setAssessments(r.assessments);setActiveAssessId(r.assessments[0].id);}
      if(r.owners&&typeof r.owners==="object")setOwners(r.owners);
      setAzStatus("synced");setAzError("");setAzLastSync(new Date());
    }catch(e){
      setAzStatus("error");
      setAzError(e.status===401?"Your session expired — sign out and back in.":"Refresh failed: "+(e.message||e));
    }
  };

  const azSyncAssessments=async(newAssessments)=>{
    try{await apiSaveState({assessments:newAssessments,owners});setAzStatus("synced");setAzError("");setAzLastSync(new Date());}
    catch(e){
      setAzStatus("error");
      if(e.status===409&&e.body&&e.body.latest){
        // Conflict: another user saved while we were editing. Reload and warn.
        setAzError("Another user saved before you. The latest data has been loaded — please re-apply your changes.");
        const latest=e.body.latest;
        if(Array.isArray(latest.assessments))setAssessments(latest.assessments);
        if(latest.owners)setOwners(latest.owners);
      }else{
        setAzError("Could not save assessments: "+(e.message||e));
      }
    }
  };

  const azSyncOwners=async(newOwners)=>{
    try{await apiSaveState({assessments,owners:newOwners});setAzStatus("synced");setAzError("");setAzLastSync(new Date());}
    catch(e){
      setAzStatus("error");
      setAzError("Could not save owners: "+(e.message||e));
    }
  };

  const [page,setPage]=useState("dashboard"),[aDom,setADom]=useState(null);

  const domain=DOMAINS.find(d=>d.id===aDom);

    <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:14}}>{n.icon}</span>{n.label}</div>

    {n.id==="domains"&&<span style={{background:C.blue+"33",color:C.blue,border:`1px solid ${C.blue}44`,borderRadius:10,padding:"1px 6px",fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{assessments.length}</span>}
  </button>;
  return<div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    <div style={{width:215,background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>

      <div style={{padding:"10px 11px",borderBottom:`1px solid ${C.border}`,background:C.card}}>
        <Lbl c="CMMC SCORE"/>
        <div style={{display:"flex",alignItems:"baseline",gap:4}}><span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:lv?.color||C.sub}}>{overall!==null?overall.toFixed(1):"—"}</span><span style={{fontSize:9,color:C.sub}}>/5.0</span></div>

// ── SAS TOKEN EXPIRY WARNING (module-level, no IIFE needed) ─────────────────
function SasExpiryWarning({token}){
  if(!token)return null;
  const seMatch=token.match(/se=([^&]+)/);
  if(!seMatch)return null;
  try{
    const expiry=new Date(decodeURIComponent(seMatch[1]));
    const daysLeft=Math.ceil((expiry-new Date())/(1000*60*60*24));
    if(daysLeft>30)return null;
    const isExpired=daysLeft<=0;
    const isUrgent=daysLeft<=7;
    return<div style={{padding:"8px 12px",background:isUrgent?C.red+"20":C.amber+"15",border:`1px solid ${isUrgent?C.red+"55":C.amber+"44"}`,borderRadius:7,marginBottom:10,fontSize:10,color:isUrgent?C.red:C.amber,lineHeight:1.6}}>
      {isExpired
        ?`⛔ SAS token EXPIRED — generate a new one in Azure portal immediately`
        :`⚠️ SAS token expires in ${daysLeft} day${daysLeft!==1?'s':''} — renew soon in Azure portal`}
    </div>;
  }catch(e){return null;}
}


// ── AUDIT LOG PAGE (Admin only) ──────────────────────────────────────────────
function AuditLogPage({user}){
  const [entries,setEntries]=React.useState(()=>loadAuditLog());
  const [filterCat,setFilterCat]=React.useState("ALL");
  const [filterUser,setFilterUser]=React.useState("");
  const [filterDateFrom,setFilterDateFrom]=React.useState("");
  const [filterDateTo,setFilterDateTo]=React.useState("");
  const [search,setSearch]=React.useState("");
  const [page2,setPage2]=React.useState(0);
  const PAGE_SIZE=50;

  // Audit log content is gated behind an explicit "Show" action. Reasons:
  //   1. Compliance — audit entries contain user emails, failed-login attempts,
  //      and other potentially sensitive content. Requiring a deliberate click
  //      before any entry text appears prevents accidental exposure.
  //   2. The user explicitly requested this: filter first, then show.
  //
  // The shown flag is reset to false whenever any filter changes, so users
  // re-confirm that the new filter results are what they want to view.
  const [shown,setShown]=React.useState(false);
  // appliedFilters captures the filter snapshot at the moment "Show" was clicked.
  // We only render entries that match the APPLIED filters (not the live ones),
  // so subsequent filter edits don't leak partial results before re-Show.
  const [appliedFilters,setAppliedFilters]=React.useState(null);

  const refresh=()=>{fetchAuditLog().then(es=>setEntries(es)).catch(e=>console.error("[audit fetch]",e.message));};

  React.useEffect(()=>{
    // Log that an admin OPENED the audit log page — but do NOT auto-show entries.
    // The actual viewing event will be logged when they click "Show Audit Log".
    logAudit("ADMIN","Audit Log Page Opened","Admin opened the audit log page (entries hidden until Show is clicked)",user);
    fetchAuditLog().then(es=>setEntries(es)).catch(e=>console.error("[audit fetch]",e.message));
  },[]);

  // Reset shown=false whenever any filter changes — forces a re-Show with the
  // new filter values. This is the core of the "filter first, then show"
  // pattern: users must explicitly opt in to viewing each filter combination.
  React.useEffect(()=>{
    setShown(false);
    setAppliedFilters(null);
    setPage2(0);
  },[filterCat,filterUser,filterDateFrom,filterDateTo,search]);

  // Apply the live filter values into appliedFilters and reveal entries.
  const showAudit=()=>{
    setAppliedFilters({filterCat,filterUser,filterDateFrom,filterDateTo,search});
    setShown(true);
    // Log the actual view event with the applied filter snapshot — this is the
    // event auditors care about (who looked at what slice of the audit log).
    const filterSummary=[
      filterCat!=="ALL"?`category=${filterCat}`:null,
      filterUser?`user~"${filterUser}"`:null,
      filterDateFrom?`from=${filterDateFrom}`:null,
      filterDateTo?`to=${filterDateTo}`:null,
      search?`search="${search}"`:null,
    ].filter(Boolean).join(", ")||"no filters";
    logAudit("ADMIN","Audit Log Viewed",`Filters: ${filterSummary}`,user);
  };

  // Hide entries again — useful for stepping away from a screen without
  // clearing filters or wanting to re-confirm before re-showing.
  const hideAudit=()=>{
    setShown(false);
    setAppliedFilters(null);
  };

  // Apply the SNAPSHOT taken at Show-click time, not the live filter state.
  // If shown is false (user hasn't clicked Show yet), we don't compute any
  // matching entries at all — just an empty array.
  const filtered = (!shown||!appliedFilters) ? [] : entries.filter(e=>{
    const f=appliedFilters;
    if(f.filterCat!=="ALL"&&e.category!==f.filterCat)return false;
    if(f.filterUser&&!(e.userEmail||"").toLowerCase().includes(f.filterUser.toLowerCase()))return false;
    if(f.filterDateFrom&&e.ts<f.filterDateFrom)return false;
    if(f.filterDateTo&&e.ts>f.filterDateTo+"T23:59:59")return false;
    if(f.search){const q=f.search.toLowerCase();if(!(e.action||"").toLowerCase().includes(q)&&!(e.details||"").toLowerCase().includes(q)&&!(e.userEmail||"").toLowerCase().includes(q)&&!(e.category||"").toLowerCase().includes(q))return false;}
    return true;
  });

  const paged=filtered.slice(page2*PAGE_SIZE,(page2+1)*PAGE_SIZE);
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const catColor={AUTH:C.cyan,USER:C.purple,ASSESSMENT:C.green,SECURITY:C.red,DATA:C.amber,ADMIN:"#a78bfa"};
  const iS={background:"#071726",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 10px",color:C.text,fontSize:10,fontFamily:"'Space Grotesk',sans-serif",outline:"none"};

  const doExport=()=>{
    logAudit("ADMIN","Audit Log Export","Exported "+filtered.length+" records",user);
    const header=["Timestamp","Category","Action","Details","User Email","User Role"];
    const rows=[header,...filtered.map(e=>[e.ts,e.category,e.action,e.details,e.userEmail,e.userRole])];
    const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`CMA_AuditLog_${new Date().toISOString().slice(0,10)}.csv`;
    a.style.display='none';document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},100);
  };

  const doClear=()=>{
    if(!window.confirm("Clear all audit logs? This cannot be undone."))return;
    clearAuditLog();logAudit("ADMIN","Audit Log Cleared","All audit log entries deleted by admin",user);refresh();
  };

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:C.text}}>Audit Logs</div>
        <div style={{fontSize:10,color:C.sub,marginTop:3,fontFamily:"'JetBrains Mono',monospace"}}>{entries.length} total entries{shown?` · ${filtered.length} matching applied filters`:" · entries hidden — set filters and click Show Audit Log"}</div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={refresh} style={{background:"none",border:`1px solid ${C.border}`,color:C.sub,borderRadius:8,padding:"7px 14px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>↺ Refresh</button>
        <button onClick={doExport} disabled={!shown||filtered.length===0}
          title={!shown?"Show the audit log first to export the matching entries.":(filtered.length===0?"No entries match the current filters.":"Export the entries currently displayed.")}
          style={{background:(!shown||filtered.length===0)?"#163d5a":"linear-gradient(135deg,#166534,#16a34a)",color:(!shown||filtered.length===0)?C.sub:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:10,fontWeight:700,cursor:(!shown||filtered.length===0)?"not-allowed":"pointer",fontFamily:"'Space Grotesk',sans-serif",opacity:(!shown||filtered.length===0)?0.6:1}}>⬇ Export CSV</button>
        <button onClick={doClear} style={{background:C.red+"22",border:`1px solid ${C.red}44`,color:C.red,borderRadius:8,padding:"7px 14px",fontSize:10,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>🗑 Clear All</button>
      </div>
    </div>

    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:9,color:C.sub,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".06em"}}>FILTER & SEARCH</div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {shown
            ?<span style={{fontSize:9,color:C.green,fontFamily:"'JetBrains Mono',monospace"}}>✓ {filtered.length} result{filtered.length!==1?"s":""} shown</span>
            :<span style={{fontSize:9,color:C.amber,fontFamily:"'JetBrains Mono',monospace"}}>⊘ entries hidden</span>}
          <button onClick={()=>{setSearch("");setFilterCat("ALL");setFilterUser("");setFilterDateFrom("");setFilterDateTo("");setPage2(0);}}
            style={{background:"none",border:`1px solid ${C.amber}44`,color:C.amber,borderRadius:7,padding:"4px 12px",fontSize:9,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>✕ Reset</button>

            <div style={{fontSize:10,color:C.sub,lineHeight:1.5,wordBreak:"break-word"}}>{e.details}</div>
            <div style={{fontSize:9,color:C.sub,lineHeight:1.5}}>
              <div style={{color:C.text,fontWeight:600,fontSize:9}}>{e.userEmail}</div>
              <div style={{fontSize:8}}>{e.userRole}</div>
            </div>
          </div>;
        })}
      </div>}

    {shown&&totalPages>1&&<div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:14}}>
      <button onClick={()=>setPage2(p=>Math.max(0,p-1))} disabled={page2===0}
        style={{background:"none",border:`1px solid ${C.border}`,color:page2===0?C.muted:C.sub,borderRadius:6,padding:"5px 12px",fontSize:10,cursor:page2===0?"not-allowed":"pointer"}}>← Prev</button>
      <span style={{fontSize:10,color:C.sub,fontFamily:"'JetBrains Mono',monospace"}}>Page {page2+1} of {totalPages} · {filtered.length} entries</span>
      <button onClick={()=>setPage2(p=>Math.min(totalPages-1,p+1))} disabled={page2>=totalPages-1}
        style={{background:"none",border:`1px solid ${C.border}`,color:page2>=totalPages-1?C.muted:C.sub,borderRadius:6,padding:"5px 12px",fontSize:10,cursor:page2>=totalPages-1?"not-allowed":"pointer"}}>Next →</button>
    </div>}
  </div>;
}

function App(){
  const [user,setUser]=useState(null);
  const [appUsers,setAppUsers]=useState([]);
  const [aadError,setAadError]=useState("");
  const [bootstrapping,setBootstrapping]=useState(true);
  // Kept for compatibility with components that still take aadCfg as a prop.
  // It's now a constant that says "yes, server-side SSO is configured".
  const aadCfg=DEFAULT_AAD;
  const setAadCfg=()=>{ /* no-op: server-managed */ };

  const refreshUsers=()=>setAppUsers(getCredUsers());

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const me=await fetchMe();
        if(cancelled)return;
        if(!me){
          // Not authenticated. The UI will show <Login/>, which redirects to
          // /.auth/login/aad on click. We DELIBERATELY do not auto-redirect
          // here so admins can see the friendly login screen the first time.
          setUser(null);
          setBootstrapping(false);
          return;
        }
        setUser(me);
        // Best-effort fetch of the user directory — tolerated to fail for
        // non-admins.
        try{await fetchUsersDir();refreshUsers();}catch(_){}
        setBootstrapping(false);
        // Log session start. The server attaches the real identity, so this
        // can't be spoofed.
        logAudit("AUTH","Session Started",`Signed in via ${me.identityProvider||"aad"}`);
      }catch(e){
        if(cancelled)return;
        console.error("[App] bootstrap failed:",e);
        setAadError("Could not contact the API: "+(e.message||e)+". Reload the page and try again.");
        setBootstrapping(false);
      }
    })();
    return()=>{cancelled=true;};
  },[]);

  // 8h-warn / 9h-logout inactivity timer. Logout hits SWA's logout endpoint.
  useEffect(()=>{
    if(!user)return;
    const WARN_MS=8*60*60*1000, LOGOUT_MS=9*60*60*1000;
    let warnTimer,logoutTimer;
    const reset=()=>{
      clearTimeout(warnTimer);clearTimeout(logoutTimer);
      warnTimer=setTimeout(()=>{
        if(window.confirm("Your session has been inactive for 8 hours. Click OK to stay signed in, or Cancel to sign out."))reset();
        else handleLogout();
      },WARN_MS);
      logoutTimer=setTimeout(()=>{alert("You have been signed out due to inactivity.");handleLogout();},LOGOUT_MS);
    };
    const events=["mousedown","keydown","touchstart","scroll"];
    events.forEach(ev=>window.addEventListener(ev,reset,{passive:true}));
    reset();
    return()=>{clearTimeout(warnTimer);clearTimeout(logoutTimer);events.forEach(ev=>window.removeEventListener(ev,reset));};
  },[user]);

  const handleLogout=()=>{
    logAudit("AUTH","Logout","User signed out");
    // The SWA logout endpoint clears the session cookie and redirects.
    window.location.href="/.auth/logout?post_logout_redirect_uri=/";
  };

  if(bootstrapping){
    return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#03101c",color:"#537a98",fontFamily:"'JetBrains Mono',monospace",fontSize:12,letterSpacing:".1em"}}>VERIFYING SESSION…</div>;
  }
  if(!user){
    return<Login aadError={aadError}/>;
  }
  return<Shell user={user} onLogout={handleLogout} appUsers={appUsers} setAppUsers={setAppUsers} aadCfg={aadCfg} setAadCfg={setAadCfg} refreshUsers={refreshUsers}/>;
}


// ── REACT ERROR BOUNDARY — catches JS errors, shows recovery UI ──────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null,info:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){
    this.setState({info});
    try{logAudit("SECURITY","Application Error",error.message+"\n"+info.componentStack.slice(0,200),null);}catch(e){}
  }
  reset(){this.setState({hasError:false,error:null,info:null});}
  render(){
    if(!this.state.hasError)return this.props.children;
    const C2={bg:"#03101c",card:"#092035",text:"#c8e8ff",sub:"#537a98",red:"#e63946",amber:"#f4a261",cyan:"#00d4ff"};
    return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C2.bg,padding:20}}>
      <div style={{maxWidth:560,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C2.text,marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:12,color:C2.sub,lineHeight:1.7}}>An unexpected error occurred in the application. Your data is safe — this is a display error only.</div>
        </div>
        <div style={{background:C2.card,border:"1px solid #0f2d47",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:10,color:C2.red,fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>ERROR DETAILS</div>
          <div style={{fontSize:11,color:C2.sub,fontFamily:"'JetBrains Mono',monospace",wordBreak:"break-all",lineHeight:1.6}}>{this.state.error?.message||"Unknown error"}</div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>this.reset()} style={{flex:1,background:"linear-gradient(135deg,#005f8a,#00d4ff)",color:"#02111e",border:"none",borderRadius:9,padding:"12px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>↺ Try Again</button>
          <button onClick={()=>window.location.reload()} style={{flex:1,background:"none",border:"1px solid #0f2d47",color:C2.sub,borderRadius:9,padding:"12px",fontSize:13,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>⟳ Reload Page</button>
        </div>
        <div style={{marginTop:12,fontSize:9,color:"#163d5a",textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}>If this keeps happening, clear browser cache (Ctrl+Shift+R) or contact your administrator.</div>
      </div>
    </div>;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
